            setLabelJ('⏳ Erinnerung gesetzt', `${when} Uhr: ${text}`);
            jarvisSpeak(`Alles klar, ich erinnere dich um ${when} Uhr an ${text}.`);
        }

        function triggerReminder(r) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.35, 0.7].forEach(t => {
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.frequency.value = 988;
                    g.gain.setValueAtTime(0.28, ctx.currentTime + t);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.3);
                    o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.3);
                });
            } catch(e) {}
            // Verknüpfte Notiz als "erinnert" markieren
            const note = savedNotes.find(n => n.rid === r.id);

        function getSpotifyClientId() {

        const SPOTIFY_DEFAULT_TOKEN = '';

        function getSpotifyToken() {
            try {
                const token = localStorage.getItem('spotifyToken');
                const expiry = parseInt(localStorage.getItem('spotifyTokenExpiry') || '0');
                if (token && Date.now() < expiry) return token;
                return SPOTIFY_DEFAULT_TOKEN;
            } catch(e) { return SPOTIFY_DEFAULT_TOKEN; }
        }

        function saveSpotifyToken(token, expiresIn) {
            try {
                localStorage.setItem('spotifyToken', token);
                localStorage.setItem('spotifyTokenExpiry', String(Date.now() + expiresIn * 1000));
            } catch(e) {}
        }

        function generatePKCEVerifier() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            let v = '';
            for (let i = 0; i < 128; i++) v += chars.charAt(Math.floor(Math.random() * chars.length));
            return v;
        }
        async function generatePKCEChallenge(verifier) {
            const enc = new TextEncoder();
            const data = enc.encode(verifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        function getSpotifyRedirectUri() {
            return window.location.href.split('#')[0].split('?')[0];
        }

        function handleSpotifyCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (!code) return;
            const verifier = localStorage.getItem('spotify_pkce_verifier');
            if (!verifier) return;
            const clientId = getSpotifyClientId();
            const redirectUri = getSpotifyRedirectUri();
            fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `grant_type=authorization_code&code=${code}&redirect_uri=${encodeURIComponent(redirectUri)}&client_id=${clientId}&code_verifier=${verifier}`
            }).then(r => r.json()).then(data => {
                if (data.access_token) {
                    saveSpotifyToken(data.access_token, data.expires_in || 3600);
                    history.replaceState(null, '', window.location.pathname);
                    localStorage.removeItem('spotify_pkce_verifier');
                    // Popup: Hauptfenster benachrichtigen und schließen
                    if (window.opener && !window.opener.closed) {
                        try { window.opener.postMessage('spotify_auth_ok', '*'); } catch(e) {}
                        window.close();
                    } else {
                        updateSpotifyStatus();
                    }
                } else {
                    console.error('Spotify Token Error:', data);
                    alert('Spotify Login fehlgeschlagen: ' + (data.error_description || data.error || 'Unbekannt'));
                }
            }).catch(e => console.error('Spotify Token Error:', e));
        }

        // Token vom Popup empfangen
        window.addEventListener('message', (ev) => {
            if (ev.data === 'spotify_auth_ok') updateSpotifyStatus();
        });

        async function spotifyLogin() {
            const inputId = document.getElementById('spotifyClientId').value.trim();
            const clientId = inputId || getSpotifyClientId();
            if (!clientId) { alert('Bitte Spotify Client ID eingeben.'); return; }
            try { localStorage.setItem('spotifyClientId', clientId); } catch(e) {}
            const verifier = generatePKCEVerifier();
            localStorage.setItem('spotify_pkce_verifier', verifier);
            const challenge = await generatePKCEChallenge(verifier);
            const redirectUri = getSpotifyRedirectUri();
            const scopes = 'user-read-playback-state user-modify-playback-state user-read-currently-playing';
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=code&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${encodeURIComponent(scopes)}&code_challenge=${challenge}&code_challenge_method=S256`;
            // Handy/Touch: Popups nach 'await' werden von iOS Safari blockiert →
            // stattdessen im selben Tab weiterleiten (Token kommt via handleSpotifyCallback zurück).
            const isMobile = /iP(hone|ad|od)|Android/i.test(navigator.userAgent) || 'ontouchstart' in window;
            if (isMobile) {
                window.location.href = authUrl;
            } else {
                const popup = window.open(authUrl, 'spotify_auth', 'width=500,height=700,left=300,top=200');
                if (!popup) window.location.href = authUrl; // Popup blockiert → Redirect
            }
        }

        async function spotifyAPI(method, endpoint, body = null) {
            const token = getSpotifyToken();
            if (!token) return { _error: 'Kein Token' };
            try {
                const opts = { method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } };
                if (body) opts.body = JSON.stringify(body);
                const res = await fetch('https://api.spotify.com/v1' + endpoint, opts);
                if (res.status === 204) return {};
                const json = await res.json().catch(() => ({}));
                if (!res.ok) return { _error: json.error?.message || 'HTTP ' + res.status, _status: res.status };
                return json;
            } catch(e) { return { _error: 'Netzwerk: ' + e.message }; }
        }

        async function spotifyGetDevices() {

        async function ensureActiveDevice() {
            // Web-Player im Browser bevorzugen
            if (spotifyWebDeviceId) return spotifyWebDeviceId;

            if (!devices.length) return null;
            const active = devices.find(d => d.is_active);
            if (active) return active.id;
            const first = devices[0];
            await spotifyAPI('PUT', '/me/player', { device_ids: [first.id], play: false });
            return first.id;

        async function loadGoveeDevices() {
            const key = getGoveeKey();
            const el = document.getElementById('goveeStatus');
            if (!key) { if (el) { el.style.color = '#3a3a42'; el.textContent = 'Kein Key → Demo-Modus'; } return; }
            try {
                const res = await fetch(`${GOVEE_BASE}/user/devices`, { headers: { 'Govee-API-Key': key } });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    goveeDevices = [];
                    if (el) { el.style.color = '#a0415d'; el.textContent = `Fehler ${res.status}: ${data.message || 'API-Key prüfen'}`; }

                // Nur die echten Lampen anzeigen — Gruppen wie "Alle" ausblenden
                const GOVEE_ALLOWED = ['zimmer', 'govee glide lively'];
                const all = data.data || [];
                goveeDevices = all.filter(d => GOVEE_ALLOWED.includes((d.deviceName || '').toLowerCase().trim()));

        function goveeSend(d, capability) {
            const key = getGoveeKey();
            if (!key || !d) return Promise.resolve();
            return fetch(`${GOVEE_BASE}/device/control`, {
                method: 'POST',
                headers: { 'Govee-API-Key': key, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    requestId: Date.now() + '-' + Math.random().toString(36).slice(2, 8),
                    payload: { sku: d.sku, device: d.device, capability }
                })

        async function goveeControl(cmd, targets = null) {
            const key = getGoveeKey();
            if (!key) return false;
            if (!goveeDevices.length) await loadGoveeDevices();
            const devs = (targets && targets.length) ? targets : goveeDevices;
            if (!devs.length) return false;
            let capability = null;
            if (cmd.name === 'turn')       capability = { type: 'devices.capabilities.on_off',        instance: 'powerSwitch', value: cmd.value === 'on' ? 1 : 0 };
            if (cmd.name === 'brightness') capability = { type: 'devices.capabilities.range',         instance: 'brightness',  value: cmd.value };
            if (cmd.name === 'color')      capability = { type: 'devices.capabilities.color_setting', instance: 'colorRgb',    value: (cmd.value.r << 16) | (cmd.value.g << 8) | cmd.value.b };
            if (!capability) return false;
            await Promise.all(devs.map(d => goveeSend(d, capability)));
            return true;
        }

        // Gerätename im Befehl erkennen ("zimmer licht an" → nur Gerät "Zimmer")
        function matchGoveeTargets(p) {
            const hits = goveeDevices.filter(d => {
                const name = (d.deviceName || '').toLowerCase().trim();
                if (!name) return false;
                if (p.includes(name)) return true;
                return name.split(/\s+/).some(w => w.length >= 3 && p.includes(w));
            });
            return hits;
        }

        const COLOR_MAP = {
            'rot':    {r:255,g:0,  b:0  }, 'red':   {r:255,g:0,  b:0  },
            'grün':   {r:0,  g:220,b:0  }, 'green': {r:0,  g:220,b:0  },
            'blau':   {r:0,  g:80, b:255}, 'blue':  {r:0,  g:80, b:255},
            'gelb':   {r:255,g:200,b:0  }, 'yellow':{r:255,g:200,b:0  },
            'weiß':   {r:255,g:255,b:255}, 'white': {r:255,g:255,b:255},
            'lila':   {r:160,g:0,  b:255}, 'purple':{r:160,g:0,  b:255},
            'pink':   {r:255,g:0,  b:150}, 'rosa':  {r:255,g:100,b:180},
            'orange': {r:255,g:80, b:0  }, 'cyan':  {r:0,  g:255,b:255},
            'türkis': {r:0,  g:200,b:180}, 'mint':  {r:0,  g:255,b:150},
        };

        async function controlGoveeLights(param) {
            const p = (param || '').toLowerCase().trim();
            if (!goveeDevices.length) await loadGoveeDevices();

            // Zielgeräte: Name im Befehl? Sonst alle
            const targets = matchGoveeTargets(p);
            const who = targets.length ? targets.map(d => d.deviceName).join(' und ') : 'Alle Lichter';

            // Aus: auch "löschen", "ausschalten", "ausmachen"
            if (/\b(aus|ausschalten|ausmachen|lösch\w*|loesch\w*|off)\b/.test(p)) {
                await goveeControl({ name: 'turn', value: 'off' }, targets);
                return `${who} aus.`;
            }
            // An: auch "einschalten", "anmachen"
            if (/\b(an|ein|einschalten|anschalten|anmachen|on)\b/.test(p)) {
                // Erst einschalten, dann evtl. Farbe/Helligkeit weiter unten
                await goveeControl({ name: 'turn', value: 'on' }, targets);
                // Wenn außer "an" noch Farbe/Helligkeit im Befehl steckt, weitermachen
                if (!/\d|heller|dunkler|dimm/.test(p) && !Object.keys(COLOR_MAP).some(c => p.includes(c))) {
                    return `${who} an.`;
                }
            }

            // Helligkeit: "50" oder "50%" oder "heller"/"dunkler"
            const brightMatch = p.match(/(\d+)\s*(%|prozent)?/);
            if (brightMatch && brightMatch[1]) {
                const b = Math.min(100, Math.max(1, parseInt(brightMatch[1])));
                await goveeControl({ name: 'turn', value: 'on' }, targets);
                await goveeControl({ name: 'brightness', value: b }, targets);
                return `${who} auf ${b}% Helligkeit.`;
            }
            if (p.includes('heller')) { await goveeControl({ name: 'brightness', value: 100 }, targets); return `${who} heller.`; }
            if (p.includes('dunkler') || p.includes('dimm')) { await goveeControl({ name: 'brightness', value: 20 }, targets); return `${who} gedimmt.`; }

            // Farbe
            for (const [name, rgb] of Object.entries(COLOR_MAP)) {
                if (p.includes(name)) {
                    await goveeControl({ name: 'turn', value: 'on' }, targets);
                    await goveeControl({ name: 'color', value: rgb }, targets);
                    return `${who} auf ${name} gestellt.`;
                }
            }
            return null;
        }

        // ── WAKE WORD ─────────────────────────────────────────────
        let wakeRecog = null;
        let wakeRestartTimer = null;

        // Ein gemeinsamer AudioContext für alle Töne — iOS erlaubt Ton nur,
        // wenn der Context einmal per Fingertipp freigeschaltet wurde
        let sharedAudioCtx = null;
        function getAudioCtx() {
            if (!sharedAudioCtx) sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
            return sharedAudioCtx;
        }

        function playWakeSound() {
            try {
                const ctx = getAudioCtx();
                const gain = ctx.createGain();
                gain.connect(ctx.destination);
                [[880,0],[1100,0.1],[1320,0.2]].forEach(([freq,t]) => {
                    const osc = ctx.createOscillator();
                    osc.connect(gain);
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.12, ctx.currentTime + t);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
                    osc.start(ctx.currentTime + t);
                    osc.stop(ctx.currentTime + t + 0.2);
                });
            } catch(e) {}
        }

        const WAKE_TRIGGERS = ['jarvis', 'jarwis', 'jarfis', 'djarvis', 'harvey', 'charvis', 'travis', 'järvis'];

        function startWakeWord() {
            if (wakeRecog || recognition) return;
            clearTimeout(wakeRestartTimer);
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;
            try {
                wakeRecog = new SR();
                wakeRecog.lang            = 'de-DE';
                wakeRecog.continuous      = true;
                wakeRecog.interimResults  = true;
                wakeRecog.maxAlternatives = 3;

                let triggered = false;
                let done = false;
                let captureTimer = null;
                let afterCmd = '';

                // Beendet die Wake-Session: Befehl im selben Satz? Direkt ausführen.
                // Nur "Jarvis" allein? Signalton + aktives Zuhören starten.
                const finishCapture = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(captureTimer);
                    const cmd = afterCmd.trim();
                    try { wakeRecog && wakeRecog.abort(); } catch(_) {}
                    wakeRecog = null;
                    if (cmd.length > 1) {
                        document.getElementById('assistantInput').value = cmd;
                        processCommand();
                        wakeRestartTimer = setTimeout(startWakeWord, 700);
                    } else {
                        playWakeSound();
                        wakeRestartTimer = setTimeout(() => toggleVoiceInput(), 300);
                    }
                };

                wakeRecog.onresult = e => {
                    if (done) return;
                    let full = '';
                    const alts = [];
                    for (let i = 0; i < e.results.length; i++) {
                        full += ' ' + e.results[i][0].transcript;
                        for (let j = 0; j < e.results[i].length; j++)
                            alts.push(e.results[i][j].transcript.toLowerCase());
                    }
                    full = full.toLowerCase();
                    const heard = alts.join(' ');

                    if (!triggered) {
                        if (!WAKE_TRIGGERS.some(t => heard.includes(t))) return;
                        triggered = true;
                        // Sofort sichtbar in den Hör-Modus: offenes Panel schließen,
                        // Roboter mit Hör-Ring zeigen (sonst wirkt es "verbugt")
                        cancelAutoReturn();
                        hideAllPanels();
                        showJ('idleScreenJ', 0); showJ('idleScreen2J', 0); showJ('idleDotsJ', 0);
                        showJ('focusScreenJ', 1);
                        showJ('avatarBodyJ', 1); showJ('faceFeaturesJ', 1);
                        document.getElementById('avatarBundleJ').style.transform = '';
                        setLabelJ('Jarvis', 'Ich höre…');
                        setEmotion('surprised');
                        showJ('ringListenJ', 1);
                        // Kurz warten, ob im selben Satz noch ein Befehl folgt
                        captureTimer = setTimeout(finishCapture, 1300);
                    }

                    // Text NACH dem Wake-Wort extrahieren ("jarvis licht aus" → "licht aus")
                    const trig = WAKE_TRIGGERS.find(t => full.includes(t));
                    if (trig) {
                        const after = full.split(trig).pop().replace(/^[\s,.!?]+/, '').trim();
                        if (after !== afterCmd) {
                            afterCmd = after;
                            // Es wird noch gesprochen → Fenster verlängern
                            clearTimeout(captureTimer);
                            captureTimer = setTimeout(finishCapture, 1100);
                        }
                    }

                    // Finales Ergebnis mit Befehl → sofort ausführen
                    if (triggered && afterCmd && e.results[e.results.length - 1].isFinal) finishCapture();
                };

                wakeRecog.onend = () => {
                    if (triggered && !done) { finishCapture(); return; }
                    wakeRecog = null;
                    if (!recognition && !done) wakeRestartTimer = setTimeout(startWakeWord, 800);
                };

                wakeRecog.onerror = e => {
                    if (done) return;
                    wakeRecog = null;
                    // 'service-not-allowed' = WKWebView (WebFrame etc.) ohne Sprachdienst
                    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') { showVoiceActivateHint(); return; }
                    const delay = e.error === 'network' ? 5000 : 2000;
                    if (e.error !== 'aborted') wakeRestartTimer = setTimeout(startWakeWord, delay);
                };

                wakeRecog.start();
                const el = document.getElementById('idleVoiceStatusJ');
                if (el) el.textContent = 'VOICE ACTIVE';
            } catch(e) {
                wakeRestartTimer = setTimeout(startWakeWord, 3000);
            }
        }

        // ── SPRACH-FREISCHALTUNG (iOS braucht einen Fingertipp) ──
        let voiceUnlocked = false;
        const IS_IOS = /iP(hone|ad|od)/.test(navigator.userAgent)
                    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        // Standalone = "Zum Home-Bildschirm" hinzugefügte Vollbild-App.
        // In-App-Browser (WebFrame = WKWebView) UND Standalone sperren beide
        // die Spracherkennung (WebKit-Bug 239816) — nur echtes Safari kann es.
        const IS_STANDALONE = window.navigator.standalone === true
                           || window.matchMedia('(display-mode: standalone)').matches;
        const IS_IOS_WEBVIEW = IS_IOS && (IS_STANDALONE || !/Safari\//i.test(navigator.userAgent));
        // In einem iframe eingebettet (z. B. HA-Lovelace "Webpage"-Karte, Vorschau-Tools):
        // Browser blockieren Mikrofon dort ohne explizites allow="microphone" meist ohnehin
        // stumm oder mit Prompt-Spam. Statt beim Laden ungefragt zuzugreifen, erst auf
        // Fingertipp/Klick warten (nutzt den bestehenden "Tippen & Jarvis sagen"-Hinweis).
        let IS_EMBEDDED_FRAME = false;
        try { IS_EMBEDDED_FRAME = window.self !== window.top; } catch (e) { IS_EMBEDDED_FRAME = true; }

        function showVoiceActivateHint() {
            const b = document.getElementById('voiceActivateJ');
            if (!b) return;
            if (IS_IOS_WEBVIEW) {
                b.innerHTML = IS_STANDALONE
                    ? '⚠️ Sprache geht nicht als App — bitte in Safari öffnen'
                    : '⚠️ Sprachsteuerung geht nur in Safari — nicht in dieser App';
                b.style.borderColor = '#f39c12';
                b.style.display = 'block';
                b.onclick = IS_STANDALONE ? openInSafariHint : activateVoice;
                return;
            }
            if (!voiceUnlocked) b.style.display = 'block';
        }

        function openInSafariHint() {
            setLabelJ('⚠️ Nur in Safari', 'Home-App löschen, in Safari öffnen, dann testen');
            alert('Die "Jarvis" Sprachsteuerung funktioniert nur im echten Safari-Browser.\n\nApple sperrt sie in Vollbild-Apps vom Home-Bildschirm.\n\nSo geht es:\n1. Diese App vom Home-Bildschirm löschen\n2. bierbauchfelix.github.io/ha in Safari öffnen\n3. Dort funktioniert "Jarvis" wieder\n\n(Neue Home-Bildschirm-Verknüpfungen öffnen jetzt automatisch Safari.)');
        }

        function activateVoice() {
            if (voiceUnlocked) return;
            voiceUnlocked = true;
            // 1. AudioContext im Fingertipp erzeugen/aufwecken → Töne erlaubt
            try {
                const ctx = getAudioCtx();
                const o = ctx.createOscillator(); const g = ctx.createGain();
                g.gain.value = 0.001; o.connect(g); g.connect(ctx.destination);
                o.start(); o.stop(ctx.currentTime + 0.05);
            } catch(e) {}
            // 2. TTS-Audio-Element mit Stille freischalten (für Deepgram-Stimme)
            try {
                ttsAudio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==';
                ttsAudio.play().catch(() => {});
            } catch(e) {}
            // 3. Browser-TTS freischalten
            try {
                if (window.speechSynthesis) {
                    const u = new SpeechSynthesisUtterance(' ');
                    u.volume = 0;
                    speechSynthesis.speak(u);
                }
            } catch(e) {}
            const b = document.getElementById('voiceActivateJ');
            if (b) b.style.display = 'none';
            startWakeWord();
            // Im In-App-Browser bleibt die Warnung sichtbar
            if (IS_IOS_WEBVIEW) showVoiceActivateHint();
        }

        // ── SPOTIFY FULL VIEW ─────────────────────────────────────
        let musicViewFull = false;

        function toggleMusicView() {
            musicViewFull = !musicViewFull;
            if (musicViewFull) {
                showJ('musicModeJ', 0);
                showJ('musicFullModeJ', 1);
                showJ('avatarBodyJ', 0); showJ('faceFeaturesJ', 0);
            } else {
                showJ('musicFullModeJ', 0);
                showJ('musicModeJ', 1);
                showJ('avatarBodyJ', 0); showJ('faceFeaturesJ', 0);
            }
        }

        function openMusicFull() {
            hideAllPanels();
            musicViewFull = true;
            showJ('focusScreenJ', 1);
            showJ('avatarBodyJ', 0); showJ('faceFeaturesJ', 0);
            document.getElementById('avatarBundleJ').style.transform = '';
            document.getElementById('musicFullOverlayJ').classList.add('active');
            setLabelJ('Spotify', 'Musik — Vollansicht');

            async function updateFull() {
                const d = await spotifyAPI('GET', '/me/player/currently-playing');
                const img = d?.item?.album?.images?.[0]?.url || '';
                const t = d?.item;
                const fi = document.getElementById('fullCoverImgJ');
                const ff = document.getElementById('fullCoverFallbackJ');
                const bg = document.getElementById('coverBlurBgJ');
                if (img && fi) {
                    fi.src = img; fi.style.opacity = 1;
                    if (ff) ff.style.display = 'none';
                    if (bg) bg.style.backgroundImage = `url(${img})`;
                } else if (fi) {
                    fi.style.opacity = 0;
                    if (ff) ff.style.display = 'flex';
                }
                if (!t) return;
                const artist = t.artists.map(a => a.name).join(', ');
                const pct = Math.round((d.progress_ms / t.duration_ms) * 100);
                const setT = (id, v) => { const e = document.getElementById(id); if(e) e.textContent = v; };
                setT('fullTitleJ', t.name);
                setT('fullArtistJ', artist);
                setT('fullAlbumJ', t.album?.name || '');
                setT('fullTimeJ', fmtMs(d.progress_ms));
                setT('fullDurJ', fmtMs(t.duration_ms));
                const prog = document.getElementById('fullProgressJ');
                if (prog) prog.style.width = pct + '%';
                const btn = document.getElementById('fullPlayBtnJ');
                if (btn) btn.textContent = d.is_playing ? '⏸' : '▶';
                const eq = document.getElementById('fullEqJ');
                if (eq) eq.style.opacity = d.is_playing ? '1' : '0';
            }
            updateFull();
            spotifyPollInterval = setInterval(updateFull, 2000);
        }

        function closeMusicFull() {
            hideAllPanels();
            openMusicMode();
        }

        async function setSpotifyVolume(val) {
            await spotifyAPI('PUT', `/me/player/volume?volume_percent=${val}`);
        }

        // ── FUSSBALL ──────────────────────────────────────────────
        const FOOTBALL_LEAGUES = {
            'fifa.world': 'WM 2026', 'ger.1': 'Bundesliga', 'eng.1': 'Premier League',
            'uefa.champions': 'Champions League', 'esp.1': 'La Liga', 'ita.1': 'Serie A'
        };
        let currentLeague = 'fifa.world';

        async function openFootball(league) {
            hideAllPanels();
            showJ('focusScreenJ', 1);
            document.getElementById('avatarBundleJ').style.transform = 'translateX(-410px)';
            showJ('avatarBodyJ', 1); showJ('faceFeaturesJ', 1);
            document.getElementById('footballOverlayJ').classList.add('active');
            armAutoReturn(60);
            setLabelJ('Fußball', FOOTBALL_LEAGUES[league] || 'Fußball');
            const dateStr = new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
            document.getElementById('fbDateJ').textContent = dateStr;
            document.getElementById('fbMatchListJ').innerHTML = `<div style="color:#3a3a42;font-size:13px;padding:20px 0;text-align:center;letter-spacing:1px">⚽ Lade Spiele…</div>`;
            await loadFootball(league);
        }

        async function loadFootball(league) {
            currentLeague = league;
            // Active-Button Styling
            ['fb-wm','fb-ger','fb-eng','fb-ucl','fb-esp'].forEach(id => {
                const b = document.getElementById(id);
                if (!b) return;
                b.style.background = '#1a2038'; b.style.color = '#b4b4bd'; b.style.borderColor = '#24242a';
            });
            const map = {'fifa.world':'fb-wm','ger.1':'fb-ger','eng.1':'fb-eng','uefa.champions':'fb-ucl','esp.1':'fb-esp'};
            if (map[league]) {
                const b = document.getElementById(map[league]);
                if (b) { b.style.background = '#24242a'; b.style.color = '#EEF1F9'; b.style.borderColor = '#8a8a95'; }
            }
            const nameEl = document.getElementById('fbLeagueNameJ');
            if (nameEl) nameEl.textContent = FOOTBALL_LEAGUES[league] || league;

            try {
                const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/scoreboard`);
                const data = await res.json();
                renderFootballMatches(data.events || []);
            } catch(e) {
                const el = document.getElementById('fbMatchListJ');
                if (el) el.innerHTML = `<div style="color:#a0415d;font-size:13px;padding:20px">Fehler beim Laden der Spiele.</div>`;
            }
        }

        function renderFootballMatches(events) {
            const container = document.getElementById('fbMatchListJ');
            if (!container) return;
            if (!events.length) {
                container.innerHTML = `<div style="color:#3a3a42;font-size:13px;padding:20px;text-align:center">Keine Spiele heute ⚽<br><br><span style="font-size:11px">Liga-Pause? Schau bei 🏆 WM vorbei!</span></div>`;
                return;
            }
            container.innerHTML = events.slice(0, 8).map((ev, i) => {
                const comp = ev.competitions?.[0];
                const home = comp?.competitors?.find(c => c.homeAway === 'home');
                const away = comp?.competitors?.find(c => c.homeAway === 'away');
                const state = comp?.status?.type?.state;
                const clock = comp?.status?.displayClock || '';
                const period = comp?.status?.period || '';
                const homeScore = home?.score ?? '–';
                const awayScore = away?.score ?? '–';
                const homeName = home?.team?.shortDisplayName || home?.team?.name || '?';
                const awayName = away?.team?.shortDisplayName || away?.team?.name || '?';
                const kickoff = ev.date ? new Date(ev.date).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '';
                const isLive = state === 'in';
                const isDone = state === 'post';
                const border = isLive ? '#1d9e75' : isDone ? '#24242a' : '#24242a';
                const scoreColor = isLive ? '#1d9e75' : isDone ? '#EEF1F9' : '#3a3a42';
                const statusBadge = isLive
                    ? `<span style="background:#0d2e1e;color:#1d9e75;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600">🟢 LIVE ${period ? period+"'" : ''} ${clock}</span>`
                    : isDone
                    ? `<span style="color:#3a3a42;font-size:10px">Abpfiff</span>`
                    : `<span style="color:#8a8a95;font-size:11px">${kickoff} Uhr</span>`;

                return `<div style="background:#10141f;border:1px solid ${border};border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:8px;animation:matchInJ 0.3s ease both;animation-delay:${i*0.06}s">
                    <div style="flex:1;min-width:0">
                        <div style="font-size:14px;color:#EEF1F9;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${homeName}</div>
                        <div style="font-size:12px;color:#8a8a95;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${awayName}</div>
                    </div>
                    <div style="text-align:center;min-width:70px">
                        <div style="font-size:22px;font-weight:700;color:${scoreColor};letter-spacing:2px">${homeScore}:${awayScore}</div>
                        <div style="margin-top:4px">${statusBadge}</div>
                    </div>
                </div>`;
            }).join('');
        }

        // ── WECKER / ALARM ────────────────────────────────────────
        let alarms = [];

        function loadAlarms() {
            try { alarms = JSON.parse(localStorage.getItem('jarvisAlarms') || '[]'); } catch(e) { alarms = []; }
        }

        function saveAlarms() {
            try { localStorage.setItem('jarvisAlarms', JSON.stringify(alarms)); } catch(e) {}
        }

        function addAlarm(timeStr, label) {
            alarms.push({ id: Date.now(), time: timeStr, label: label || 'Wecker', active: true, fired: false });
            saveAlarms();
            renderAlarmPanel();
        }

        function deleteAlarm(id) {
            alarms = alarms.filter(a => a.id !== id);
            saveAlarms();
            renderAlarmPanel();
        }

        function toggleAlarmActive(id) {
            const a = alarms.find(x => x.id === id);
            if (a) { a.active = !a.active; a.fired = false; saveAlarms(); renderAlarmPanel(); }
        }

        function checkAlarms() {
            const now = new Date();
            const cur = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            alarms.forEach(a => {
                if (a.active && !a.fired && a.time === cur) {
                    a.fired = true;
                    saveAlarms();
                    triggerAlarm(a);
                }
                // Fired-Flag um Mitternacht zurücksetzen
                if (a.fired && a.time !== cur) a.fired = false;
            });
        }

        function triggerAlarm(alarm) {
            // Ton
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.4, 0.8, 1.2].forEach(t => {
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.frequency.value = 880; g.gain.setValueAtTime(0.3, ctx.currentTime+t);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.35);
                    o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.35);
                });
            } catch(e) {}
            jarvisSpeak(`Wecker! ${alarm.label}`);
            setLabelJ('⏰ Wecker', alarm.label);
        }

        function renderAlarmPanel() {
            const el = document.getElementById('alarmListJ');
            if (!el) return;
            const sorted = [...alarms].sort((a,b) => a.time.localeCompare(b.time));

            if (!sorted.length) {
                el.innerHTML = `<div style="color:#3a3a42;font-size:13px;text-align:center;margin-top:40px;line-height:2">
                    <div style="font-size:40px;margin-bottom:12px">⏰</div>
                    Noch keine Wecker.<br>
                    <span style="color:#8a8a95">Sag "Stell Wecker auf 7 Uhr"</span>
                </div>`;
                return;

        // ── Lautstärke ("lauter"/"leiser" per Sprachbefehl, in 20-%-Schritten) ──
        let jarvisVolume = parseFloat(localStorage.getItem('jarvisVolume') || '1') || 1;
        function adjustJarvisVolume(dir) {

        async function jarvisSpeak(text) {
            if (!speechEnabled) return;
            // Stop any current speech
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            if (window.speechSynthesis) speechSynthesis.cancel();

            const dgKey = getDeepgramKey();
            if (dgKey) {
                try {
                    const res = await fetch(`https://api.deepgram.com/v1/speak?model=${DEEPGRAM_VOICE}&encoding=mp3`, {
                        method: 'POST',
                        headers: { 'Authorization': 'Token ' + dgKey, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text })
                    });
                    if (!res.ok) throw new Error('Deepgram Fehler ' + res.status);
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    ttsAudio.src = url;
                    ttsAudio.volume = jarvisVolume;
                    ttsAudio.onplay  = mouthStart;
                    ttsAudio.onended = () => { mouthStop(); URL.revokeObjectURL(url); currentAudio = null; };
                    ttsAudio.onerror = () => { mouthStop(); currentAudio = null; };
                    currentAudio = ttsAudio;
                    ttsAudio.play().catch(() => { mouthStop(); currentAudio = null; });
                    return;
                } catch(e) { /* Fallback auf Browser-TTS */ }
            }

            // Browser-TTS Fallback
            if (!window.speechSynthesis) return;
            const utt = new SpeechSynthesisUtterance(text);
            utt.lang = 'de-DE'; utt.rate = 0.9; utt.pitch = 1.1;
            utt.volume = jarvisVolume;
            const trySpeak = () => {
                const v = speechSynthesis.getVoices();
                const voice = v.find(x => x.lang === 'de-DE' && /natural|online|neural/i.test(x.name))
                           || v.find(x => x.lang === 'de-DE' && /katja|helena|vicki/i.test(x.name))
                           || v.find(x => x.lang.startsWith('de'));
                if (voice) utt.voice = voice;
                utt.onstart = mouthStart; utt.onend = utt.onerror = mouthStop;
                speechSynthesis.speak(utt);
            };
            speechSynthesis.getVoices().length ? trySpeak() : (speechSynthesis.onvoiceschanged = trySpeak);
        }

        async function toggleVoiceInput() {
            if (recognition) { recognition.stop(); return; }

            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) {
                setLabelJ('Fehler', 'Nur Chrome/Edge unterstützt Sprache');
                jarvisSpeak('Spracherkennung funktioniert nur in Chrome oder Edge.');
                return;
            }

            // Mikrofon-Erlaubnis explizit anfragen
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(e) {
                setLabelJ('Kein Mikrofon', 'Bitte Mikrofon-Erlaubnis erteilen');
                jarvisSpeak('Bitte erlaube den Mikrofon-Zugriff im Browser.');
                return;
            }

            const btn = document.getElementById('micBtnJ');
            let silenceTimerV = null;
            recognition = new SR();
            recognition.lang = 'de-DE';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                btn.textContent = '🔴';
                btn.style.background = '#3c1f2e';
                btn.style.borderColor = '#a0415d';
                // Klar sichtbarer Hör-Modus: Panel schließen, Roboter + Ring zeigen
                cancelAutoReturn();
                hideAllPanels();
                showJ('idleScreenJ', 0); showJ('idleScreen2J', 0); showJ('idleDotsJ', 0);
                showJ('focusScreenJ', 1);
                showJ('avatarBodyJ', 1); showJ('faceFeaturesJ', 1);
                document.getElementById('avatarBundleJ').style.transform = '';
                showJ('ringListenJ', 1);
                setEmotion('surprised');
                setLabelJ('Zuhören…', 'Sprich jetzt…');
                // Wenn 10s gar nichts kommt, beenden
                silenceTimerV = setTimeout(() => { try { recognition && recognition.stop(); } catch(_) {} }, 10000);
            };

            recognition.onresult = e => {
                clearTimeout(silenceTimerV);
                const full = Array.from(e.results).map(r => r[0].transcript).join('');
                document.getElementById('assistantInput').value = full;
                // Erst nach 2,5s Sprechpause auswerten — Zeit zum Weiterreden
                silenceTimerV = setTimeout(() => { try { recognition && recognition.stop(); } catch(_) {} }, 2500);
            };

            recognition.onerror = e => {
                const msgs = {
                    'not-allowed': 'Mikrofon-Erlaubnis verweigert.',
                    'no-speech':   'Nichts gehört – bitte nochmal versuchen.',
                    'network':     'Netzwerkfehler bei der Spracherkennung.',
                    'aborted':     ''
                };
                const msg = msgs[e.error] || `Fehler: ${e.error}`;
                if (msg) setLabelJ('Mikrofon-Fehler', msg);
            };

            recognition.onend = () => {
                clearTimeout(silenceTimerV);
                recognition = null;
                btn.textContent = '🎤';
                btn.style.background = '';
                btn.style.borderColor = '';
                // Erst jetzt auswerten — der komplette Satz steht im Eingabefeld
                if (document.getElementById('assistantInput').value.trim()) processCommand();
                setTimeout(startWakeWord, 1500);
            };

            recognition.start();
        }

        function createSvgLine(txt, y) {
            const t = document.createElementNS("http://www.w3.org/2000/svg", "text");

        function renderMathChips(expr) {
            const group = document.getElementById('mathChipsGroupJ');
            group.innerHTML = '';

            const tokens = expr.replace(/\s+/g, '').match(/\d+\.?\d*|[+\-*/^().]/g) || [];
            if (!tokens.length) return;

            const gap = 8;
            const chipH = 52;
            const chipW = Math.min(64, Math.floor((440 - (tokens.length - 1) * gap) / tokens.length));
            const totalW = tokens.length * chipW + (tokens.length - 1) * gap;
            let x = 820 - totalW / 2;
            const y = 280;

            tokens.forEach((token, i) => {
                const isOp = /^[+\-*/^()]$/.test(token);
                const delay = `${i * 0.06}s`;
                const anim = `mathChipInJ 0.35s ease forwards ${delay}`;

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x); rect.setAttribute('y', y);
                rect.setAttribute('width', chipW); rect.setAttribute('height', chipH);
                rect.setAttribute('rx', '10');
                rect.setAttribute('fill', isOp ? '#131722' : '#161b2c');
                rect.setAttribute('stroke', isOp ? '#5566cc' : '#33447a'); rect.setAttribute('stroke-width', '1.5');
                rect.style.cssText = `opacity:0; animation:${anim}`;
                group.appendChild(rect);

                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', x + chipW / 2); txt.setAttribute('y', y + chipH / 2 + 1);
                txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('dominant-baseline', 'middle');
                txt.setAttribute('style', `font-size:${isOp?26:22}px; font-weight:700; fill:${isOp?'#7f8de0':'#EEF1F9'}; opacity:0; animation:${anim}`);
                txt.textContent = token === '*' ? '×' : token === '/' ? '÷' : token;
                group.appendChild(txt);

                x += chipW + gap;
            });
        }

        function runCenteredMath(expr) {
            showJ('ringListenJ', 0); showJ('mathRingJ', 0);
            showJ('avatarBodyJ', 0); showJ('faceFeaturesJ', 0);
            let result = 0;
            try { result = eval(expr.replace(/\^/g, '**')); } catch(e) { result = "Error"; }
            renderMathChips(expr);
            document.getElementById('mathResultJ').textContent = result;
            showJ('mathTextJ', 1);
            setLabelJ('Rechenzentrum', `${expr} = ${result}`);
            jarvisSpeak(`${expr} ergibt ${result}`);
        }

    '*{text-shadow:none!important;box-shadow:none!important;backdrop-filter:none!important}'
    +'svg *{filter:none!important}'
    +'.panel-inner{animation:none!important}';
  document.querySelectorAll('svg animate,svg animateTransform').forEach(function(a){
    try{ if((parseFloat(a.getAttribute('dur'))||0)<1.2) a.remove(); }catch(e){}
  });
}
</script>

</body>
