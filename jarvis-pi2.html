<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- WICHTIG: KEIN apple-mobile-web-app-capable! Der Standalone-Modus
         (Vollbild-Home-Screen-App) sperrt auf iOS die Spracherkennung.
         Ohne den Tag läuft die Home-Screen-Verknüpfung im Safari-Kontext
         → "Jarvis" funktioniert. -->
    <title>Jarvis OS - Ultimate Assistant</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Modak&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0b0d;
            --bg-card: #10141f;
            --bg-accent: #1a2038;
            --border-color: #33447a;
            --text-primary: #f2f2f4;
            --text-secondary: #b0bce0;
            --text-muted: #838fb8;
            --color-success: #4ec99a;
            --color-sun: #e8b24a;

            /* Lichter-Modus (HomeKit Farb-Variablen) */
            --color-bg-light: #0b0e16;
            --color-border-light: #33447a;
            --color-text-warning: #f39c12;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100svh;
            box-sizing: border-box;
        }

        h1 { display: none; }

        .app-container {
            display: block;
            width: 100%;
        }

        /* Monitor füllt das Display — Breite wird so gekappt, dass das
           16:9-SVG samt Header exakt in die Viewport-Höhe passt (iPhone XR & Co.) */
        .monitor-section {
            background: var(--bg-card);
            border: none;
            border-radius: 0;
            padding: 8px 12px 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
            margin: 0 auto;
            width: min(100vw, calc((100vh - 66px) * 1.7778 + 24px));
            width: min(100vw, calc((100svh - 66px) * 1.7778 + 24px));
        }
        .svg-overlay {
            position: absolute;
            top: 8px; left: 12px; right: 12px; bottom: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 12px;
            overflow: hidden;
        }
        .svg-overlay.active { opacity: 1; pointer-events: auto; }
        /* Right-side overlay (starts at ~51.5% = x:660/1280) */
        .svg-overlay-right {
            position: absolute;
            top: 8px; left: calc(12px + (100% - 24px) * 0.516); right: 12px; bottom: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            overflow: hidden;
            border-radius: 0 12px 12px 0;
        }
        .svg-overlay-right.active { opacity: 1; pointer-events: auto; }
        .svg-overlay-right .panel-inner {
            height: 100%;
            background: linear-gradient(180deg, #0d1018 0%, #0b0e14 100%);
            border-left: 1px solid #33447a;
            border-top: 3px solid #5566cc;
            display: flex;
            flex-direction: column;
            padding: 20px 22px;
            box-sizing: border-box;
            animation: panelSlideInJ 0.3s ease both;
        }

        .monitor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(59, 53, 94, 0.4);
            padding-bottom: 6px;
            padding-right: 46px; /* Platz für das Zahnrad */
        }

        .phase-j { font-size: 14px; font-weight: 600; color: var(--text-muted); margin: 0; white-space: nowrap; }
        .trigger-j { font-size: 12px; color: var(--text-secondary); margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Command Center = Einstellungs-Schublade (Zahnrad oben rechts) */
        .control-section {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(400px, 92vw);
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            border-radius: 20px 0 0 20px;
            padding: 60px 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            box-sizing: border-box;
            z-index: 1000;
            transform: translateX(110%);
            transition: transform 0.3s ease;
            box-shadow: -12px 0 40px rgba(0,0,0,0.6);
        }
        .control-section.open { transform: translateX(0); }

        #settingsGearJ {
            position: fixed;
            top: 8px;
            right: 10px;
            z-index: 1001;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(21,18,38,0.85);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 19px;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.2s;
        }
        #settingsGearJ:hover { transform: rotate(45deg); border-color: var(--text-muted); }

        #drawerBackdropJ {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #drawerBackdropJ.open { opacity: 1; pointer-events: auto; }

        .control-section h2 {
            font-size: 18px;
            margin: 0 0 4px 0;
            color: var(--text-secondary);
        }

        .config-box {
            background: rgba(10, 8, 19, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .config-box h3 {
            font-size: 12px;
            margin: 0;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-input-group, .input-row-j {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input[type="text"], input[type="number"] {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 10px;
            font-size: 16px; /* verhindert iOS-Auto-Zoom beim Fokussieren */
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }

        .btn-j {
            background: var(--bg-accent);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-j:hover {
            background: #2e284f;
            border-color: var(--text-muted);
        }

        /* HTML-Form-Elemente im SVG Lichter-Modus */
        .color-swatch { width: 30px; height: 30px; border-radius: 50%; padding: 0; margin: 0; cursor: pointer; position: relative; border: 1px solid rgba(155,108,224,0.4); flex: 0 0 auto; -webkit-appearance: none; appearance: none; box-shadow: 0 0 8px rgba(0,0,0,0.5); transition: transform .15s ease, box-shadow .15s ease; }
        .color-swatch:hover { transform: scale(1.15); }
        .color-swatch.active::after { content: ''; position: absolute; inset: -4px; border: 2px solid #c9d0ff; border-radius: 50%; box-shadow: 0 0 10px rgba(155,108,224,0.8); }
        /* Futuristische HUD-Karten & Buttons (Lichter) */
        .btn-hud-j { background: linear-gradient(135deg, rgba(85,102,204,0.25), rgba(125,99,216,0.25)); color:#c9d0ff; border:1px solid rgba(125,99,216,0.6); border-radius:8px; padding:7px 14px; font-size:12px; font-weight:600; letter-spacing:0.5px; cursor:pointer; transition: all .15s ease; font-family:inherit; }
        .btn-hud-j:hover { background: linear-gradient(135deg, rgba(85,102,204,0.45), rgba(155,108,224,0.45)); box-shadow:0 0 12px rgba(155,108,224,0.5); }
        .btn-hud-off-j { color:#8a93b8; border-color: rgba(90,100,140,0.5); background: rgba(20,24,40,0.5); }
        .btn-hud-off-j:hover { background: rgba(40,44,70,0.6); box-shadow:0 0 10px rgba(90,100,140,0.4); }
        .led-card-j { position:relative; background: linear-gradient(160deg, rgba(18,22,38,0.9), rgba(11,14,24,0.9)); border:1px solid #33447a; border-radius:12px; padding:14px 16px; margin-bottom:12px; overflow:hidden; }
        .led-card-j::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(#5566cc,#9b6ce0); box-shadow:0 0 10px rgba(155,108,224,0.6); }
        .led-card-j .led-corner { position:absolute; width:12px; height:12px; border:1px solid rgba(155,108,224,0.6); }
        .led-dot-j { display:inline-block; width:7px; height:7px; border-radius:50%; background:#4ec99a; box-shadow:0 0 8px #4ec99a; margin-right:8px; vertical-align:middle; }
        .hud-range-j { -webkit-appearance:none; appearance:none; height:5px; border-radius:3px; background:linear-gradient(90deg,#5566cc,#9b6ce0); outline:none; cursor:pointer; }
        .hud-range-j::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:16px; height:16px; border-radius:50%; background:#c9d0ff; border:2px solid #7d63d8; box-shadow:0 0 8px rgba(155,108,224,0.9); cursor:pointer; }
        .hud-range-j::-moz-range-thumb { width:16px; height:16px; border-radius:50%; background:#c9d0ff; border:2px solid #7d63d8; box-shadow:0 0 8px rgba(155,108,224,0.9); cursor:pointer; }

        /* Animationen */
        @keyframes lidBlinkJ { 0%,97%,100% { opacity: 0; } 98.5% { opacity: 1; } }
        @keyframes pulseJ { 0%,100% { opacity: 0.45; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.015); } }
        @keyframes mouthTalkJ { 0%,100% { ry: 5; } 50% { ry: 13; } }
        @keyframes pupilDriftJ { 0%,100% { transform: translate(0px,0px); } 33% { transform: translate(2.5px,1px); } 66% { transform: translate(-2px,1.5px); } }
        @keyframes idleBounceJ { 0%,100%{transform:translateY(0)} 30%{transform:translateY(-18px)} 60%{transform:translateY(-10px)} 80%{transform:translateY(-16px)} }
        @keyframes idleWobbleJ { 0%,100%{transform:rotate(0deg)} 20%{transform:rotate(-6deg)} 50%{transform:rotate(5deg)} 75%{transform:rotate(-3deg)} }
        @keyframes idleNodJ { 0%,100%{transform:scaleY(1)} 25%{transform:scaleY(0.92)} 50%{transform:scaleY(1.05)} 75%{transform:scaleY(0.96)} }
        @keyframes idleShakeJ { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-8px)} 35%{transform:translateX(8px)} 55%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        @keyframes idleSpinJ { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        /* ── Jarvis-Core (holografischer HUD) ── */
        @keyframes coreSpinCW  { 0%{transform:rotate(0deg)}   100%{transform:rotate(360deg)} }
        @keyframes coreSpinCCW { 0%{transform:rotate(360deg)} 100%{transform:rotate(0deg)} }
        @keyframes corePulse   { 0%,100%{opacity:0.55;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
        @keyframes coreFlicker { 0%,100%{opacity:0.9} 48%{opacity:0.75} 50%{opacity:1} 52%{opacity:0.8} }
        @keyframes coreDash    { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-140} }
        .coreRingCW  { animation: coreSpinCW 24s linear infinite;  transform-origin: 640px 330px; }
        .coreRingCCW { animation: coreSpinCCW 34s linear infinite; transform-origin: 640px 330px; }
        .coreRingFast{ animation: coreSpinCW 9s linear infinite;   transform-origin: 640px 330px; }
        .corePulseEl { animation: corePulse 2.6s ease-in-out infinite; transform-origin: 640px 330px; }
        .coreCoreEl  { animation: coreFlicker 5s ease-in-out infinite; transform-origin: 640px 330px; }
        .coreDashEl  { animation: coreDash 6s linear infinite; }
        /* Idle-1 Core (kleiner, um 280,350) */
        .coreRingCWs { animation: coreSpinCW 24s linear infinite;  transform-origin: 280px 350px; }
        .coreRingCCWs{ animation: coreSpinCCW 34s linear infinite; transform-origin: 280px 350px; }
        .corePulseS  { animation: corePulse 2.6s ease-in-out infinite; transform-origin: 280px 350px; }
        .coreCoreS   { animation: coreFlicker 5s ease-in-out infinite; transform-origin: 280px 350px; }
        /* Core reagiert auf Zustand (setEmotion → --coreLvl): moduliert Helligkeit */
        #idleCoreJ, #idleCore2J, #avatarBodyJ { filter: brightness(calc(0.55 + var(--coreLvl, 0.72) * 0.75)); transition: filter 0.7s ease; }
        /* Zuhören: schneller Innenring einblenden */
        #avatarBodyJ.coreListening #coreFastRingJ { opacity: 1 !important; }
        /* Idle-2: Roboter lugt von oben rein und wippt neugierig */
        @keyframes peekBobJ { 0%,100%{transform:translateY(0)} 50%{transform:translateY(12px)} }
        @keyframes peekTiltJ { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
        .peekBobJ { animation: peekBobJ 3.5s ease-in-out infinite; transform-origin: 640px 0px; }
        @keyframes idle2InJ { 0%{opacity:0;transform:translateY(-24px)} 100%{opacity:1;transform:translateY(0)} }
        @keyframes mathChipInJ { 0% { opacity:0; transform: translateY(12px); } 100% { opacity:1; transform: translateY(0); } }
        @keyframes lineInJ { 0% { opacity:0; transform: translateX(-6px); } 100% { opacity:1; transform: translateX(0); } }
        @keyframes sunRotateJ { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes notePopN { 0% { opacity:0; transform: scale(0.85) rotate(-2deg); } 60% { opacity:1; transform: scale(1.02) rotate(1deg); } 100% { opacity:1; transform: scale(1) rotate(-1deg); } }
        @keyframes cursorBlinkN { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        @keyframes stampInJ { 0% { opacity:0; transform: scale(2.4); } 55% { opacity:1; transform: scale(0.9); } 75% { transform: scale(1.06); } 100% { opacity:1; transform: scale(1); } }
        @keyframes sparklePopJ { 0% { opacity:0; transform: scale(0.2); } 35% { opacity:1; transform: scale(1.25); } 100% { opacity:0; transform: scale(0.5) translateY(-18px); } }

        .lidJ { animation: lidBlinkJ 7s ease-in-out infinite; }
        .ringJ { animation: pulseJ 1.6s ease-in-out infinite; transform-origin: 640px 330px; }
        .talkJ { animation: mouthTalkJ 0.35s ease-in-out infinite; transform-origin: center; }
        @keyframes matchInJ { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes panelSlideInJ { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
        @keyframes alarmPulse { from{background:#1a2038;border-color:#f39c12} to{background:#2d2010;border-color:#f39c12} }
        @keyframes alarmRing { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-10deg)} 40%{transform:rotate(10deg)} 60%{transform:rotate(-6deg)} 80%{transform:rotate(6deg)} }
        @keyframes eqBar { from{height:4px} to{height:22px} }
        .eq-bar { height: 4px; }
        .pupilJ { animation: pupilDriftJ 3.6s ease-in-out infinite; }
        .fadeJ { transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1); }
        .fadeFastJ { transition: opacity 0.35s cubic-bezier(0.4,0,0.2,1); }
        .sunRaysJ { animation: sunRotateJ 25s linear infinite; transform-origin: 610px 300px; }
        
        #avatarBundleJ { transform-origin: 640px 330px; transition: transform 0.7s cubic-bezier(0.4,0,0.2,1); }
        svg { display: block; width: 100%; height: auto; border-radius: 16px; background: #0c0c0e; box-shadow: inset 0 0 20px rgba(0,0,0,0.6); }

        /* ── QUERFORMAT-HANDY (iPhone XR & Co.): echtes randloses Vollbild ──
           Das 16:9-Dashboard füllt die volle Breite; per SVG-'slice' wird
           oben/unten nur der dekorative Rand minimal beschnitten. */
        @media (orientation: landscape) and (max-height: 520px) {
            .monitor-section {
                width: 100vw !important;
                height: 100vh; height: 100svh;
                padding: 0;
                margin: 0;
                overflow: hidden;
            }
            .monitor-header {
                position: absolute;
                top: 0; left: 0; right: 46px;
                z-index: 5;
                margin: 0;
                padding: 5px 14px 14px;
                border: none;
                background: linear-gradient(180deg, rgba(10,8,19,0.92) 0%, rgba(10,8,19,0) 100%);
                pointer-events: none;
            }
            .phase-j  { font-size: 13px; text-shadow: 0 1px 4px #000; }
            .trigger-j{ font-size: 11px; text-shadow: 0 1px 4px #000; }
            svg { height: 100%; border-radius: 0; box-shadow: none; }
            .svg-overlay        { top: 0; left: 0; right: 0; bottom: 0; border-radius: 0; }
            .svg-overlay-right  { top: 0; bottom: 0; right: 0; left: 51.6%; border-radius: 0; }
            .svg-overlay-right .panel-inner { padding: 16px 18px; }
        }
    </style>
</head>
<body>

    <div id="sleepOverlay" onclick="wakeUp()" style="display:none;position:fixed;inset:0;background:#000;z-index:9999;cursor:pointer;transition:opacity 1.2s ease;opacity:0;">
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#1a2038;">
            <div style="font-size:48px;margin-bottom:12px;">🌙</div>
            <div style="font-size:13px;letter-spacing:2px;">Tippen zum Aufwecken</div>
        </div>
    </div>

    <h1>Jarvis Autonomous Assistant Terminal</h1>

    <button id="settingsGearJ" onclick="toggleSettingsDrawer()" title="Einstellungen">⚙️</button>
    <div id="drawerBackdropJ" onclick="toggleSettingsDrawer(false)"></div>
    <button id="voiceActivateJ" onclick="activateVoice()" style="display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:1001;background:#26262b;border:1px solid #8a8a95;color:#eef1f9;padding:12px 24px;border-radius:26px;font-size:15px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.6);cursor:pointer;white-space:nowrap;">🎤 Tippen &amp; „Jarvis" sagen</button>
    <button id="nightBadgeJ" onclick="nightModeOff()" title="Nachtmodus beenden" style="display:none;position:fixed;bottom:16px;left:16px;z-index:1001;background:#26262b;border:1px solid #f39c12;color:#f39c12;padding:9px 16px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;">🌙 Nachtmodus — tippen zum Beenden</button>

    <div class="app-container">
        
        <!-- SVG HAUPTMONITOR -->
        <div class="monitor-section">
            <div class="monitor-header">
                <p class="phase-j" id="phaseJ">Idle Dashboard</p>
                <p class="trigger-j" id="triggerJ">System bereit</p>
            </div>
            
            <svg width="100%" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <linearGradient id="bgGJ" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#161618"/><stop offset="100%" stop-color="#0a0a0c"/></linearGradient>
                    <radialGradient id="ambSmallJ" cx="20%" cy="50%" r="50%"><stop offset="0%" stop-color="#5566cc" stop-opacity="0.08"/><stop offset="100%" stop-color="#5566cc" stop-opacity="0"/></radialGradient>
                    <radialGradient id="ambBigJ" cx="50%" cy="46%" r="55%"><stop offset="0%" stop-color="#5566cc" stop-opacity="0.1"/><stop offset="100%" stop-color="#5566cc" stop-opacity="0"/></radialGradient>
                    <linearGradient id="robotHeadGJ" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0%" stop-color="#FBFBFC"/><stop offset="55%" stop-color="#E4E4E8"/><stop offset="100%" stop-color="#BFBFC6"/></linearGradient>
                    <radialGradient id="podGJ" cx="35%" cy="30%" r="75%"><stop offset="0%" stop-color="#55555c"/><stop offset="100%" stop-color="#26262b"/></radialGradient>
                    <filter id="eyeGlowJ" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <!-- Jarvis-Core: Verläufe (Indigo + Dark-Lila-Akzent) & Glow -->
                    <radialGradient id="coreGlowJ" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#8f9bff" stop-opacity="0.9"/><stop offset="45%" stop-color="#6a58c8" stop-opacity="0.4"/><stop offset="100%" stop-color="#6a58c8" stop-opacity="0"/></radialGradient>
                    <linearGradient id="coreRingGradJ" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#5566cc"/><stop offset="55%" stop-color="#7d63d8"/><stop offset="100%" stop-color="#9b6ce0"/></linearGradient>
                    <filter id="coreBlurJ" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <!-- Wiederverwendbares Holo-Avatar-Emblem (ersetzt Roboter-Deko in Panels). Lokal um (280,340). SMIL, damit es an jeder <use>-Position rotiert. -->
                    <g id="holoAvatarJ">
                        <circle cx="280" cy="340" r="128" fill="url(#coreGlowJ)" opacity="0.45">
                            <animate attributeName="opacity" values="0.32;0.5;0.32" dur="3.2s" repeatCount="indefinite"/>
                        </circle>
                        <!-- äußerer gestrichelter Ring (CW) -->
                        <g>
                            <animateTransform attributeName="transform" type="rotate" from="0 280 340" to="360 280 340" dur="28s" repeatCount="indefinite"/>
                            <circle cx="280" cy="340" r="112" fill="none" stroke="url(#coreRingGradJ)" stroke-width="1.3" stroke-dasharray="2 12" opacity="0.75"/>
                            <circle cx="280" cy="228" r="3.5" fill="#9b6ce0" filter="url(#coreBlurJ)"/>
                            <circle cx="280" cy="452" r="2.8" fill="#5566cc" filter="url(#coreBlurJ)"/>
                        </g>
                        <!-- mittlerer Tick-Ring (CCW) -->
                        <g>
                            <animateTransform attributeName="transform" type="rotate" from="360 280 340" to="0 280 340" dur="34s" repeatCount="indefinite"/>
                            <circle cx="280" cy="340" r="86" fill="none" stroke="#5566cc" stroke-width="0.9" opacity="0.5"/>
                            <g stroke="#7d63d8" stroke-width="1.8" opacity="0.8">
                                <line x1="280" y1="256" x2="280" y2="268"/><line x1="280" y1="412" x2="280" y2="424"/>

        function weatherIcon(id) {
            if (id >= 200 && id < 300) return '⛈️';
            if (id >= 300 && id < 400) return '🌦️';
            if (id >= 500 && id < 510) return '🌧️';
            if (id >= 510 && id < 600) return '🌨️';
            if (id >= 600 && id < 700) return '❄️';
            if (id >= 700 && id < 800) return '🌫️';
            if (id === 800) return '☀️';
            if (id === 801) return '🌤️';
            if (id === 802) return '⛅';
            if (id >= 803) return '☁️';
            return '🌡️';
        }

        async function getLiveWeather() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Dachau,de&appid=dc73a9090b9cd0f45f276fd2497d2775&units=metric&lang=de`);
                const data = await response.json();
                if(data.cod === 200) {
                    globalWeatherData = data;
                    const wid = data.weather[0].id;
                    const icon = weatherIcon(wid);
                    const temp = `${Math.round(data.main.temp)}°C`;
                    const desc = data.weather[0].description;
                    // Idle 1
                    document.getElementById('weatherTempJ').textContent = temp;
                    document.getElementById('weatherCityStatusJ').textContent = data.name;
                    const descEl = document.getElementById('weatherDescIdleJ');
                    if (descEl) descEl.textContent = desc;
                    const iconEl = document.getElementById('weatherIconJ');
                    if (iconEl) iconEl.textContent = icon;
                    // Idle 2

                    set2('weatherCityStatusJ2', data.name);
                    set2('weatherDescJ2', desc);
                    set2('weatherIconJ2', icon);

        function animateValue(from, to, dur, onUpdate, onDone) {
            const start = performance.now();
            (function frame(now) {
                let t = Math.min(1, (now - start) / dur);
                t = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; // easeInOut
                onUpdate(from + (to - from) * t);
                if (t < 1) requestAnimationFrame(frame); else if (onDone) onDone();
            })(start);
        }

        function runClockSteal() {
            const clock = document.getElementById('liveClockJ2');
            const arm = document.getElementById('stealArmJ');
            const armLine = document.getElementById('stealArmLineJ');
            const armEdge = document.getElementById('stealArmLineEdgeJ');
            const hand = document.getElementById('stealHandJ');
            const handDot = document.getElementById('stealHandDotJ');
            const stolen = document.getElementById('stolenDigitJ');
            const cover = document.getElementById('digitCoverJ');
            if (!clock || !arm || !stolen) return;
            let bbox; try { bbox = clock.getBBox(); } catch(e) { return; }
            const digitCX = bbox.x + bbox.width - 42;            // Mitte der letzten Ziffer
            const clockY = parseFloat(clock.getAttribute('y'));   // 368
            const digitChar = clock.textContent.slice(-1);
            const topY = 130, grabY = clockY - 44;
            let grabbed = false;

            const place = (handY) => {
                [armLine, armEdge].forEach(l => { l.setAttribute('x1', digitCX); l.setAttribute('x2', digitCX); l.setAttribute('y1', 55); l.setAttribute('y2', handY); });
                hand.setAttribute('cx', digitCX); hand.setAttribute('cy', handY);
                handDot.setAttribute('cx', digitCX); handDot.setAttribute('cy', handY);
                if (grabbed) stolen.setAttribute('y', handY + 44);
            };
            // Abdeckung + geklaute Ziffer vorbereiten
            cover.setAttribute('x', digitCX - 44); cover.setAttribute('y', bbox.y - 6);
            cover.setAttribute('width', 88); cover.setAttribute('height', bbox.height + 12);
            stolen.textContent = digitChar; stolen.setAttribute('x', digitCX); stolen.setAttribute('y', clockY);

            place(topY);
            arm.style.opacity = '1';
            animateValue(topY, grabY, 650, place, () => {
                grabbed = true;
                cover.style.opacity = '1';
                stolen.style.opacity = '1';
                animateValue(grabY, topY, 800, place, () => {          // hochziehen
                    setTimeout(() => {                                  // oben halten
                        animateValue(topY, grabY, 800, place, () => {   // zurückbringen
                            cover.style.opacity = '0';
                            stolen.style.opacity = '0';
                            grabbed = false;
                            animateValue(grabY, topY, 550, place, () => { arm.style.opacity = '0'; });
                        });
                    }, 1300);
                });
            });
        }

        function getHaCfg() {

                url: (localStorage.getItem('haUrl') || '').replace(/\/$/, ''),

        async function haFetch(path, body, timeoutMs = 15000) {
            const c = getHaCfg();
            const ctrl = new AbortController();
            const t = setTimeout(() => ctrl.abort(), timeoutMs);
            try {
                const res = await fetch(c.url + path, {
                    method: body ? 'POST' : 'GET',
                    headers: { 'Authorization': 'Bearer ' + c.token, 'Content-Type': 'application/json' },
                    body: body ? JSON.stringify(body) : undefined,
                    signal: ctrl.signal
                });
                if (!res.ok) throw new Error('HA ' + res.status);
                return await res.json();

            if (lq === 'fußball' || lq === 'fussball' || lq === 'bundesliga') { openFootball(lq === 'bundesliga' ? 'ger.1' : 'fifa.world'); return; }
            if (lq.includes("timer stopp") || lq === "stopp") { stopAllTimers(); showJ('ringListenJ', 0); setLabelJ('Timer', 'Alle Timer gestoppt.'); return; }
            if (lq === "timer" && activeTimers.length) { hideAllPanels(); showJ('idleScreenJ', 0); showJ('idleScreen2J', 0); showJ('idleDotsJ', 0); showJ('focusScreenJ', 1); showTimerScreen(); setLabelJ(activeTimers.length > 1 ? `${activeTimers.length} Timer aktiv` : 'Timer aktiv', 'Laufende Timer.'); return; }
            if (lq.startsWith("timer")) { openTimerMode(parseDurationToSeconds(lq) || 600); return; }
            if (lq.includes('notizen') && (lq.includes('lösch') || lq.includes('loesch')) && lq.includes('alle')) { savedNotes = []; saveNotesToStorage(); openNotesListMode(); setLabelJ('Notizblock', 'Alle Notizen gelöscht.'); jarvisSpeak('Alle Notizen gelöscht.'); return; }
            if (lq.startsWith("notiz löschen") || lq.startsWith("notiz loeschen")) { const m = lq.match(/\d+/); if (lq.includes("alle")) { savedNotes=[]; saveNotesToStorage(); openNotesListMode(); } else deleteNote(m ? parseInt(m[0])-1 : savedNotes.length-1); return; }
            if (lq === "notizen") { openNotesListMode(); return; }
            if (lq.startsWith("notiz ")) { openNoteMode(query.substring(6).trim()); return; }
            // Musik & Lichter laufen komplett über Home Assistant (Gemini/
            // Assist schaltet und antwortet). Ohne HA-Verbindung greifen die
            // alten Demo-Ansichten darunter.
            if (haReady() && (lq.startsWith("spiele ") || lq.startsWith("play ")
                || /^(skip|weiter|zurück|back|pause|stop|play|musik)$/.test(lq)
                || /\b(licht\w*|led\w*|lampe\w*)\b/.test(lq))) {
                askJarvisAI(query); return;
            }
            if (lq.startsWith("spiele ") || lq.startsWith("play ")) { openMusicMode(); spotifyPlay(query.replace(/^(spiele|play)\s+/i,'').trim()); return; }
            if (lq === "skip" || lq === "weiter") { skipTrack(); openMusicMode(); return; }
            if (lq === "zurück" || lq === "back") { prevTrack(); openMusicMode(); return; }
            if (lq === "pause" || lq === "stop") { musicIsPlaying=false; openMusicMode(); return; }
            if (lq === "play" || lq === "musik") { openMusicMode(); return; }
            if (lq === "lichter" || lq === "licht") { openLedControlWindow(); return; }
            if (/\b(licht|lichter|led|leds|lampe|lampen)\b/.test(lq) || (goveeDevices.length && matchGoveeTargets(lq).length)) {
                controlGoveeLights(lq).then(msg => {
                    openLedControlWindow();
                    if (msg) { setLabelJ('💡 Lichter', msg); jarvisSpeak(msg); }
                });
                return;
            }
            if (lq === "wetter" || lq.startsWith("wetter ")) { openDetailWeather(lq.startsWith("wetter ") ? query.substring(7).trim() : 'Dachau'); return; }
            if (/^[0-9+\-*/().^ ]+$/.test(query)) { runCenteredMath(query); return; }
            askJarvisAI(query);
        }

        function executeIntent(intent, originalQuery) {
            const { intent: action, param, antwort } = intent;
            showJ('ringListenJ', 0);
            switch(action) {
                case 'notiz':        openNoteMode(param || originalQuery); break;
                case 'timer':        openTimerMode(parseDurationToSeconds(param) || 600); break;
                case 'timer_stopp':
                    stopAllTimers();
                    setLabelJ('Timer', 'Alle Timer gestoppt.'); break;
                case 'musik':        openMusicMode(); break;
                case 'wetter':       openDetailWeather(param || 'Dachau'); break;
                case 'lichter':
                    if (getGoveeKey()) {
                        controlGoveeLights(param || originalQuery).then(msg => {
                            openLedControlWindow();
                            if (msg) { setLabelJ('💡 Lichter', msg); jarvisSpeak(msg); }
                        });
                    } else {
                        openLedControlWindow();
                    }
                    break;
                case 'notizen':      openNotesListMode(); break;
                case 'notiz_loeschen':
                    if (param === 'alle') { savedNotes=[]; saveNotesToStorage(); openNotesListMode(); setLabelJ('Notizblock','Alle gelöscht.'); }
                    else { const n = parseInt(param); deleteNote(isNaN(n) ? savedNotes.length-1 : n-1); } break;
                case 'skip':         skipTrack(); openMusicMode(); break;
                case 'zurueck':      prevTrack(); openMusicMode(); break;
                case 'pause':        if(getSpotifyToken()&&spotifyPlayer){spotifyPlayer.pause();}else{musicIsPlaying=false;} openMusicMode(); break;
                case 'play':         if(getSpotifyToken()&&spotifyPlayer){spotifyPlayer.resume();}else{musicIsPlaying=true;} openMusicMode(); break;
                case 'spiele':       openMusicMode(); spotifyPlay(param || originalQuery); break;
                case 'musik_voll':   openMusicFull(); break;
                case 'fussball': {
                    const lp = (param || '').toLowerCase();
                    const lg = lp.includes('wm') || lp.includes('weltmeister') ? 'fifa.world'
                             : lp.includes('bundes') ? 'ger.1'
                             : lp.includes('premier') ? 'eng.1'
                             : lp.includes('champions') || lp.includes('ucl') ? 'uefa.champions'
                             : lp.includes('liga') && lp.includes('la') ? 'esp.1'
                             : FOOTBALL_LEAGUES[lp] ? lp : 'fifa.world';
                    openFootball(lg); break;
                }
                case 'bahn':         openTransitMode(); break;
                case 'route': {
                    const rq = parseRouteQuery('route ' + (param || originalQuery).toLowerCase());
                    if (rq) openRouteMode(rq.from, rq.to); else openTransitMode();
                    break;
                }
                case 'fahrtzeit': {
                    const dq = parseDriveQuery('fahrtzeit ' + (param || originalQuery).toLowerCase());
                    if (dq) openDriveMode(dq.from, dq.to);
                    break;
                }
                case 'fernseher': {
                    const p = (param || '').toLowerCase();
                    const hm = p.match(/hdmi\s*(\d)/);
                    const appM = p.match(/netflix|youtube|disney|prime/);
                    if (hm) openLaunchMode('tv', 'hdmi', hm[1]);
                    else if (appM) openLaunchMode('tv', appM[0]);
                    else openLaunchMode('tv', 'power');
                    break;
                }
                case 'computer': {
                    const p = (param || '').toLowerCase();
                    const appM = p.match(/steam|discord|chrome/);
                    if (appM) openLaunchMode('pc', appM[0]);
                    else openLaunchMode('pc', 'windows');
                    break;
                }
                case 'wecker':       openAlarmMode(); break;
                case 'alarm_setzen': {
                    // param z.B. "07:30" oder "7 Uhr" oder "7:30 Aufstehen"
                    const tm = (param||'').match(/(\d{1,2})[:\.]?(\d{2})?/);
                    if (tm) {
                        const h = tm[1].padStart(2,'0'), m = (tm[2]||'00').padStart(2,'0');
                        const label = (param||'').replace(/\d+[:\.]?\d*/,'').trim() || 'Wecker';
                        addAlarm(`${h}:${m}`, label);
                        const msg = `Wecker auf ${h}:${m} Uhr gestellt.`;
                        setLabelJ('Wecker', msg); jarvisSpeak(msg); openAlarmMode();
                    } else { openAlarmMode(); }
                    break;
                }
                case 'schlaf':       sleepMode(); break;
                case 'mathe':        runCenteredMath(param || originalQuery); break;
                case 'reset':        resetToHome(); break;
                case 'frage':
                    if (antwort) { showGroqAnswer(antwort); }
                    else { askJarvisAI(originalQuery); }
                    break;
                default:             askJarvisAI(originalQuery);
            }
        }

        function showGroqAnswer(text) {
            showJ('avatarBodyJ', 0); showJ('faceFeaturesJ', 0);
            document.getElementById('avatarBundleJ').style.transform = '';
            const container = document.getElementById('infoLinesJ');
            container.innerHTML = '';
            let yPos = 220, currentLine = '';
            text.split(' ').forEach(word => {
                if ((currentLine + word).length > 52) {
                    createSvgLine(currentLine.trim(), yPos);
                    currentLine = word + ' '; yPos += 32;
                    if (yPos > 490) return;
                } else { currentLine += word + ' '; }
            });
            if (currentLine.trim()) createSvgLine(currentLine.trim(), yPos);
            showJ('infoModeJ', 1);
            setLabelJ('Jarvis KI', 'Groq · llama-3.3-70b');
            jarvisSpeak(text);
        }

        async function processCommand() {
            const inputField = document.getElementById('assistantInput');
            const query = inputField.value.trim();
            if (!query) return;
            inputField.value = "";

            hideAllPanels();
            showJ('idleScreenJ', 0); showJ('idleScreen2J', 0); showJ('idleDotsJ', 0);
            showJ('focusScreenJ', 1);
            showJ('ringListenJ', 1);
            setLabelJ('Jarvis denkt…', `"${query}"`);

            // Mathe direkt abfangen – kein Groq nötig
            if (/^[0-9+\-*/().^ \^]+$/.test(query)) {
                runCenteredMath(query); return;
            }

            // Erinnerungen, Nachtmodus, Uhrzeit & ÖPNV direkt abfangen
            const lqPC = query.toLowerCase();
            if (isClockQuery(lqPC)) { handleClockQuery(lqPC); return; }
            if (isDateQuery(lqPC)) { handleDateQuery(); return; }
            if (lqPC.includes('erinner')) { handleReminderCommand(lqPC); return; }
            if (lqPC.startsWith('nachtmodus')) { handleNightCommand(lqPC); return; }
            // Lautstärke der Jarvis-Stimme ("mach dich lauter/leiser")
            if (/\blauter\b/.test(lqPC)) { adjustJarvisVolume(1); return; }
            if (/\bleiser\b/.test(lqPC)) { adjustJarvisVolume(-1); return; }
            // Dashboard wechseln: "dashboard 1/2", "idle 1/2", "erstes/zweites dashboard"
            if (/\b(dashboard|idle|ansicht|bildschirm)\s*(eins|1|erste)\b/.test(lqPC) || /\berste[sr]?\s*(dashboard|ansicht|bildschirm)\b/.test(lqPC)) { resetToHome(); switchIdle(0); setLabelJ('Idle Dashboard', 'Erstes Dashboard'); return; }
            if (/\b(dashboard|idle|ansicht|bildschirm)\s*(zwei|2|zweite)\b/.test(lqPC) || /\bzweite[sr]?\s*(dashboard|ansicht|bildschirm)\b/.test(lqPC)) { resetToHome(); switchIdle(1); setLabelJ('Idle Dashboard', 'Zweites Dashboard'); return; }
            // Emotion zeigen: "sei traurig", "lach mal", "zeig gefühle" …
            if (lqPC.includes('gefühl') || lqPC.includes('stimmung') || lqPC.includes('emotion')) { showEmotion(EMOTION_ORDER[(EMOTION_ORDER.indexOf(currentEmotion)+1)%EMOTION_ORDER.length]); return; }
            { const emo = emotionFromText(lqPC); if (emo) { showEmotion(emo); return; } }
            if (lqPC.startsWith('route') || lqPC.startsWith('verbindung') || lqPC.includes('wie komme ich')) { const rq = parseRouteQuery(lqPC); if (rq) { openRouteMode(rq.from, rq.to); return; } }
            if (lqPC === 'bahn' || lqPC === 'zug' || lqPC === 'öpnv' || lqPC === 'oepnv' || lqPC.includes('abfahrt') || lqPC.includes('s-bahn') || lqPC === 'sbahn') { openTransitMode(); return; }

            // Licht-Befehle → Home Assistant (Gemini/Assist schaltet & antwortet)
            if (/\b(licht\w*|led\w*|lampe\w*)\b/.test(lqPC) && haReady()) { askJarvisAI(query); return; }

            // Fahrtzeit (Auto) & Geräte-Start direkt abfangen
            if (/fahrtzeit|fahrzeit|autofahrt|wie lange (fahre|fährt|braucht)/.test(lqPC)) { const dq = parseDriveQuery(lqPC); if (dq) { openDriveMode(dq.from, dq.to); return; } }
            const tvAppPC = lqPC.match(/\b(netflix|youtube|disney|prime)\b/);
            if (tvAppPC && !/\b(pc|computer|rechner)\b/.test(lqPC)) { openLaunchMode('tv', tvAppPC[1]); return; }
            const hdmiPC = lqPC.match(/\bhdmi\s*(\d)\b/);
            if (hdmiPC) { openLaunchMode('tv', 'hdmi', hdmiPC[1]); return; }
            if (/\b(fernseher|tv)\b/.test(lqPC) && /\b(an|aus|start\w*|einschalt\w*|ausschalt\w*|anmach\w*)\b/.test(lqPC)) { openLaunchMode('tv', 'power'); return; }
            const pcAppPC = lqPC.match(/\b(steam|discord|chrome)\b/);
            if (pcAppPC) { openLaunchMode('pc', pcAppPC[1]); return; }
            if (/\b(computer|rechner|pc)\b/.test(lqPC) && /\b(an|start\w*|hochfahr\w*|einschalt\w*)\b/.test(lqPC)) { openLaunchMode('pc', 'windows'); return; }

            // Alles Übrige regelt directDispatch — unbekannte Fragen landen
            // dort am Ende bei Home Assistant (Gemini).
            directDispatch(query);
        }

        // "10 sekunden", "5 min", "1 stunde 30 minuten" → Sekunden (Zahl ohne Einheit = Minuten)
        function parseDurationToSeconds(str) {
            let total = 0;
            const re = /(\d+)\s*(stunden?|std|h|minuten?|min|m|sekunden?|sek|sec|s)?/g;
            let m;
            while ((m = re.exec(String(str || '').toLowerCase())) !== null) {
                const n = parseInt(m[1]);
                const u = m[2] || '';
                if (/^st|^h/.test(u)) total += n * 3600;
                else if (/^se|^s$/.test(u)) total += n;
                else total += n * 60;
            }
            return total;
        }

        function formatDurationNice(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            const parts = [];
            if (h) parts.push(`${h} Stunde${h > 1 ? 'n' : ''}`);
            if (mins) parts.push(`${mins} Minute${mins > 1 ? 'n' : ''}`);
            if (secs) parts.push(`${secs} Sekunden`);
            return parts.join(' ') || '0 Sekunden';
        }

        // ══════════ MEHRFACH-TIMER ══════════
        // Timer laufen über Zeitstempel (endsAt) und einen globalen Ticker —
        // sie überleben Panel-Wechsel und laufen auf dem Homescreen weiter.
        let activeTimers = [];   // {id, name, total, endsAt, finished, finishedAt}
        let timerIdSeq = 1;

        function timerRemaining(t) { return Math.max(0, Math.ceil((t.endsAt - Date.now()) / 1000)); }
        function fmtTimer(s) { return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`; }
        function fmtEnd(t) { return new Date(t.endsAt).toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'}); }

        function openTimerMode(durationSeconds) {
            const total = Math.max(5, durationSeconds || 600);
            const t = { id: timerIdSeq, name: `Timer ${timerIdSeq}`, total, endsAt: Date.now() + total * 1000, finished: false };
            timerIdSeq++;
            activeTimers.push(t);
            showTimerScreen();
            const niceDur = formatDurationNice(total);
            setLabelJ(activeTimers.length > 1 ? `${activeTimers.length} Timer aktiv` : 'Timer aktiv', `${t.name}: ${niceDur} gestartet.`);
            jarvisSpeak(`${activeTimers.length > 1 ? t.name : 'Timer'} über ${niceDur} gestartet.`);
        }

        // Zeigt die passende Timer-Ansicht: 1 Timer = Ring, 2+ = nebeneinander
        function showTimerScreen() {
            showJ('ringListenJ', 0);
            showJ('avatarBodyJ', 0); showJ('faceFeaturesJ', 0);
            document.getElementById('avatarBundleJ').style.transform = '';
            if (activeTimers.length <= 1) {
                showJ('multiTimerModeJ', 0);
                showJ('timerRingGroupO', 1);
                showJ('timerDetailsGroupO', 1);
                const tn = document.getElementById('timerNameO'); if (tn) tn.textContent = 'Timer';
                const td = document.getElementById('timeDisplayO'); if (td) td.style.fill = '#EEF1F9';
                updateSingleTimerScreen();
            } else {
                showJ('timerRingGroupO', 0);
                showJ('timerDetailsGroupO', 0);
                showJ('multiTimerModeJ', 1);
                renderMultiTimers();
            }
        }

        function stopAllTimers() {
            activeTimers = [];
            showJ('timerRingGroupO', 0); showJ('timerDetailsGroupO', 0); showJ('multiTimerModeJ', 0);
            updateIdleTimerWidget();
        }

        // Einzel-Timer-Ansicht (Ring + Figur-Arm) aktualisieren
        function updateSingleTimerScreen() {
            const grp = document.getElementById('timerRingGroupO');
            if (!grp || grp.style.visibility !== 'visible') return;
            const t = activeTimers[0];
            if (!t || t.finished) return;
            const remainingSeconds = timerRemaining(t);
            const td = document.getElementById('timeDisplayO');
            if (td) td.textContent = fmtTimer(remainingSeconds);
            const endEl = document.getElementById('endTimeO');
            if (endEl) endEl.textContent = 'Endet um ' + fmtEnd(t);

            const factor = remainingSeconds / t.total;
            const angle = 360 * factor;
            const rad = (angle - 90) * Math.PI / 180;
            const cx = 640, cy = 330, r = 195;
            const endX = cx + r * Math.cos(rad);
            const endY = cy + r * Math.sin(rad);
            const largeArc = angle > 180 ? 1 : 0;

            const path = document.getElementById('progressArcO');
            if (angle >= 359.99) {
                path.setAttribute('d', `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx-0.01} ${cy-r}`);
            } else if (angle <= 0.01) {
                path.setAttribute('d', '');
            } else {
                path.setAttribute('d', `M ${cx} ${cy-r} A ${r} ${r} 0 ${largeArc} 1 ${endX} ${endY}`);
            }
            const dot = document.getElementById('progressDotO');
            dot.setAttribute('cx', endX); dot.setAttribute('cy', endY);

            // Arm der Figur folgt dem Timer-Punkt (Schulter-Pivots in Screen-Koordinaten)
            const armR = document.getElementById('timerArmRO');
            const armL = document.getElementById('timerArmLO');
            const restR = document.getElementById('timerRestRO');
            const restL = document.getElementById('timerRestLO');
            if (armR && armL) {
                if (endX >= 640) {
                    const deg = Math.atan2(endY - 396, endX - 692.8) * 180 / Math.PI;
                    armR.setAttribute('transform', `rotate(${deg} 346 445)`);
                    armR.style.opacity = 1; armL.style.opacity = 0;
                    restL.style.opacity = 1; restR.style.opacity = 0;
                } else {
                    const deg = Math.atan2(endY - 396, endX - 587.2) * 180 / Math.PI - 180;
                    armL.setAttribute('transform', `rotate(${deg} 214 445)`);
                    armL.style.opacity = 1; armR.style.opacity = 0;
                    restR.style.opacity = 1; restL.style.opacity = 0;
                }
            }
        }

        // Mehrfach-Ansicht: Karten nebeneinander (bis 3 pro Reihe)
        function renderMultiTimers() {
            const g = document.getElementById('multiTimerCardsJ');
            if (!g) return;
            const n = activeTimers.length;
            const W = 300, H = 230, GAP = 34;
            const rows = Math.ceil(n / 3);
            const startY = rows > 1 ? 140 : 230;
            g.innerHTML = activeTimers.map((t, i) => {
                const row = Math.floor(i / 3), col = i % 3;
                const inRow = Math.min(n - row * 3, 3);
                const rowW = inRow * W + (inRow - 1) * GAP;
                const x = 640 - rowW / 2 + col * (W + GAP);
                const y = startY + row * (H + GAP);
                const remaining = timerRemaining(t);
                const frac = t.finished ? 0 : (t.total ? remaining / t.total : 0);
                const timeStr = t.finished ? 'FERTIG!' : fmtTimer(remaining);
                const timeCol = t.finished ? '#f39c12' : '#EEF1F9';
                return `<g>
                    <rect x="${x}" y="${y}" width="${W}" height="${H}" rx="14" fill="#0b0e18" stroke="${t.finished ? '#f39c12' : '#33447a'}" stroke-width="1.5"/>
                    <rect x="${x}" y="${y}" width="${W}" height="3" rx="1.5" fill="url(#neonLineJ)"/>
                    <path d="M ${x+12} ${y+24} L ${x+12} ${y+12} L ${x+24} ${y+12} M ${x+W-12} ${y+H-24} L ${x+W-12} ${y+H-12} L ${x+W-24} ${y+H-12}" fill="none" stroke="#9b6ce0" stroke-width="1.4" opacity="0.8"/>
                    <text x="${x + W/2}" y="${y + 44}" text-anchor="middle" style="font-size:13px;fill:#838fb8;letter-spacing:3px">◈ ${t.name.toUpperCase()}</text>
                    <text x="${x + W/2}" y="${y + 126}" text-anchor="middle" style="font-size:${t.finished ? 40 : 54}px;fill:${timeCol};font-weight:700">${timeStr}</text>
                    <rect x="${x + 34}" y="${y + 162}" width="${W - 68}" height="6" rx="3" fill="#1a2038"/>
                    <rect x="${x + 34}" y="${y + 162}" width="${Math.max(0, (W - 68) * frac)}" height="6" rx="3" fill="url(#coreRingGradJ)"/>
                    <text x="${x + W/2}" y="${y + 202}" text-anchor="middle" style="font-size:11px;fill:#55608c;letter-spacing:2px">${t.finished ? 'ABGELAUFEN' : 'ENDET ' + fmtEnd(t)}</text>
                </g>`;
            }).join('');
        }

        // Kleines Countdown-Widget auf beiden Homescreens
        function updateIdleTimerWidget() {
            const running = activeTimers.filter(t => !t.finished);
            const txt = running.length ? '⏱ ' + running.map(t => fmtTimer(timerRemaining(t))).join('  ·  ') : '';
            ['idleTimerJ', 'idleTimer2J'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = txt;
            });
        }

        function timerFinishedFor(t) {
            // Peep-Peep-Sound (Küchentimer-Style, 4 Doppel-Pieper)
            try {
                const ctx = getAudioCtx();
                for (let r = 0; r < 4; r++) {
                    [0, 0.18].forEach(off => {
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        o.connect(g); g.connect(ctx.destination);
                        o.type = 'square';
                        o.frequency.value = 1320;
                        const start = ctx.currentTime + r * 0.9 + off;
                        g.gain.setValueAtTime(0.25, start);
                        g.gain.exponentialRampToValueAtTime(0.001, start + 0.15);
                        o.start(start); o.stop(start + 0.16);
                    });
                }
            } catch(e) {}
            // Einzel-Ansicht: Jubel-Figur
            const ringVisible = document.getElementById('timerRingGroupO').style.visibility === 'visible';
            if (ringVisible && activeTimers.length === 1) {
                const td = document.getElementById('timeDisplayO');
                if (td) { td.textContent = '0:00'; td.style.fill = '#f39c12'; }
                const tn = document.getElementById('timerNameO');
                if (tn) tn.textContent = '⏰ Timer fertig!';
                const armR = document.getElementById('timerArmRO'), armL = document.getElementById('timerArmLO');
                const restR = document.getElementById('timerRestRO'), restL = document.getElementById('timerRestLO');
                if (armR && armL) {
                    armR.setAttribute('transform', 'rotate(-60 346 445)'); armR.style.opacity = 1;
                    armL.setAttribute('transform', 'rotate(60 214 445)'); armL.style.opacity = 1;
                    if (restR) restR.style.opacity = 0;
                    if (restL) restL.style.opacity = 0;
                }
            }
            setLabelJ('⏰ Timer', `${activeTimers.length > 1 ? t.name : 'Timer'} abgelaufen!`);
            jarvisSpeak(`${activeTimers.length > 1 ? t.name + ' ist' : 'Timer'} abgelaufen!`);
        }

        // Globaler Ticker: läuft immer, egal welches Panel offen ist
        setInterval(() => {
            if (!activeTimers.length) { updateIdleTimerWidget(); return; }
            activeTimers.forEach(t => {
                if (!t.finished && timerRemaining(t) <= 0) {
                    t.finished = true;
                    t.finishedAt = Date.now();
                    timerFinishedFor(t);
                }
            });
            // Fertige Timer nach 10 s automatisch entfernen
            const hadTimers = activeTimers.length > 0;
            activeTimers = activeTimers.filter(t => !t.finished || Date.now() - t.finishedAt < 10000);
            updateSingleTimerScreen();
            const multiVisible = document.getElementById('multiTimerModeJ')?.style.visibility === 'visible';
            if (multiVisible) {
                if (activeTimers.length === 1) showTimerScreen();     // von 2 auf 1 → zurück zum Ring
                else renderMultiTimers();

        async function spotifyPlay(query) {
            if (!getSpotifyToken()) { setLabelJ('Spotify', 'Kein Token — neu einloggen!'); return; }
            setLabelJ('Spotify', `Suche "${query}"…`);

            const deviceId = await ensureActiveDevice();
            if (!deviceId) {
                setLabelJ('Spotify', 'Kein Gerät aktiv — öffne Spotify auf deinem PC/Handy!');
                document.getElementById('musicTitleJ').textContent = 'Kein aktives Gerät';
                document.getElementById('musicArtistJ').textContent = 'Öffne Spotify zuerst';
                return;
            }

            const search = await spotifyAPI('GET', `/search?q=${encodeURIComponent(query)}&type=track,artist&limit=5`);
            if (search?._error) { setLabelJ('Spotify', 'Fehler: ' + search._error); return; }

            const artist = search.artists?.items?.[0];
            const track  = search.tracks?.items?.[0];

            if (artist && artist.name.toLowerCase().includes(query.toLowerCase().split(' ')[0])) {
                const top = await spotifyAPI('GET', `/artists/${artist.id}/top-tracks?market=DE`);
                if (top?.tracks?.length > 0) {
                    const res = await spotifyAPI('PUT', `/me/player/play?device_id=${deviceId}`, { uris: top.tracks.slice(0, 10).map(t => t.uri) });
                    if (res?._error) { setLabelJ('Spotify', 'Play-Fehler: ' + res._error); return; }
                    setTimeout(() => refreshSpotifyPlayer(true), 1000);
                    setLabelJ('Spotify', `Spiele ${artist.name}`);
                    return;
                }
            }

            if (track) {
                const res = await spotifyAPI('PUT', `/me/player/play?device_id=${deviceId}`, { uris: [track.uri] });
                if (res?._error) { setLabelJ('Spotify', 'Play-Fehler: ' + res._error); return; }
                setTimeout(() => refreshSpotifyPlayer(true), 1000);
                setLabelJ('Spotify', `Spiele "${track.name}"`);
            } else {
                setLabelJ('Spotify', `Nichts gefunden für "${query}"`);
            }
        }

        function skipTrack() {
            if (getSpotifyToken()) {
                if (spotifyPlayer) { spotifyPlayer.nextTrack(); return; }
                spotifyAPI('POST', '/me/player/next').then(() => setTimeout(refreshSpotifyPlayer, 600));
                return;
            }
            musicProgress = 0;
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            musicIsPlaying = true;
        }

        function prevTrack() {
            if (getSpotifyToken()) {
                if (spotifyPlayer) { spotifyPlayer.previousTrack(); return; }
                spotifyAPI('POST', '/me/player/previous').then(() => setTimeout(refreshSpotifyPlayer, 600));
                return;
            }
            musicProgress = 0;
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            musicIsPlaying = true;
        }

        function toggleMusicPlay() {
            if (getSpotifyToken()) {
                if (spotifyPlayer) { spotifyPlayer.togglePlay(); return; }
                spotifyAPI('GET', '/me/player').then(d => {
                    if (!d) return;
                    spotifyAPI('PUT', d.is_playing ? '/me/player/pause' : '/me/player/play').then(() => setTimeout(refreshSpotifyPlayer, 600));
                });
                return;
            }
            musicIsPlaying = !musicIsPlaying;
            renderMusicPlayer();
        }

        async function goveeDeviceCmd(i, type, val) {
            const d = goveeDevices[i];
            if (!d) return;
            let capability = null, msg = '';
            if (type === 'on')     { capability = { type: 'devices.capabilities.on_off', instance: 'powerSwitch', value: 1 }; msg = 'an'; }
            if (type === 'off')    { capability = { type: 'devices.capabilities.on_off', instance: 'powerSwitch', value: 0 }; msg = 'aus'; }
            if (type === 'bright') { capability = { type: 'devices.capabilities.range', instance: 'brightness', value: parseInt(val) }; msg = `auf ${val}%`; }
            if (type === 'color')  {
                const r = parseInt(val.slice(1, 3), 16), g = parseInt(val.slice(3, 5), 16), b = parseInt(val.slice(5, 7), 16);
                capability = { type: 'devices.capabilities.color_setting', instance: 'colorRgb', value: (r << 16) | (g << 8) | b };
                msg = 'Farbe geändert';
            }
            if (!capability) return;
            await goveeSend(d, capability);
            setLabelJ('💡 ' + (d.deviceName || 'Licht'), `${d.deviceName || 'Licht'} ${msg}.`);
        }

                const day = new Date().toLocaleDateString('de-DE', { weekday: 'long' });
                setD('detWeatherCityJ', data.name);

                setD('detWeatherTempJ', `${Math.round(data.main.temp)}°`);
                setD('detWeatherIconJ', weatherIcon(data.weather[0].id));
                setD('detWeatherDescJ', data.weather[0].description);
                // Metriken
                setD('detHumidityJ', `${data.main.humidity}%`);
                const humBar = document.getElementById('detHumidityBarJ');
                if (humBar) humBar.setAttribute('width', Math.max(0, Math.min(116, 116 * data.main.humidity / 100)));
                setD('detWindJ', `${Math.round((data.wind?.speed || 0) * 3.6)} km/h`);
                const needle = document.getElementById('detWindNeedleJ');
                if (needle) needle.setAttribute('transform', `rotate(${data.wind?.deg || 0} 846 348)`);
                setD('detPressureJ', `${data.main.pressure} hPa`);
                setD('detVisibilityJ', `${((data.visibility || 0) / 1000).toFixed(1)} km`);
                setD('detFeelsJ', `${Math.round(data.main.feels_like)}°`);
                // Sonnenverlauf: Bogen-Gauge von Sonnenaufgang (links) über Mittag (oben) bis Sonnenuntergang (rechts)
                const fmtSun = ts => new Date(ts * 1000).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
                if (data.sys?.sunrise) setD('detSunriseJ', fmtSun(data.sys.sunrise));
                if (data.sys?.sunset) setD('detSunsetJ', fmtSun(data.sys.sunset));
                if (data.sys?.sunrise && data.sys?.sunset) {
                    const sunCX = 682, sunCY = 468, sunR = 42;
                    const now = Date.now() / 1000;
                    const frac = Math.max(0, Math.min(1, (now - data.sys.sunrise) / (data.sys.sunset - data.sys.sunrise)));
                    const angleDeg = -90 + frac * 180;
                    const rad = (angleDeg - 90) * Math.PI / 180;
                    const sunX = sunCX + sunR * Math.cos(rad);
                    const sunY = sunCY + sunR * Math.sin(rad);
                    const dot = document.getElementById('detSunDotJ');
                    if (dot) { dot.setAttribute('cx', sunX); dot.setAttribute('cy', sunY); }
                    const arc = document.getElementById('detSunProgressArcJ');
                    if (arc) arc.setAttribute('d', frac > 0.001 ? `M ${sunCX - sunR} ${sunCY} A ${sunR} ${sunR} 0 0 1 ${sunX} ${sunY}` : '');
                    const isNight = now < data.sys.sunrise || now > data.sys.sunset;
                    if (dot) dot.setAttribute('fill', isNight ? '#5566cc' : 'url(#coreGlowJ)');
                }

                // Vorhersage (nächste Tage, Mittagswerte) + Tages-Min/Max/Regen
                let dayMax = data.main.temp_max, dayMin = data.main.temp_min, rainSum = 0, rainN = 0;
                try {
                    const fc = await forecastRes.json();
                    const byDay = {};
                    fc.list.forEach(item => {
                        const d = new Date(item.dt * 1000);
                        const key = d.toISOString().slice(0, 10);

                        if (d - new Date() < 86400000) { // nächste 24h

                            dayMin = Math.min(dayMin, item.main.temp_min);
                            rainSum += item.pop ?? 0; rainN++;
                        }
                    });
                    const keys = Object.keys(byDay).slice(0, 5);
                    const fcHtml = keys.map((k, i) => {
                        const items = byDay[k];
                        const noon = items.find(it => new Date(it.dt * 1000).getHours() >= 12) || items[Math.floor(items.length/2)];
                        const wd = new Date(k).toLocaleDateString('de-DE', {weekday:'short'}).toUpperCase();
                        const tmax = Math.round(Math.max(...items.map(it => it.main.temp_max)));
                        const tmin = Math.round(Math.min(...items.map(it => it.main.temp_min)));
                        const x = 802 + i * 84;
                        const isToday = i === 0;
                        return `<rect x="${x}" y="90" width="76" height="164" rx="14" fill="${isToday ? '#131a30' : '#10141f'}" stroke="${isToday ? '#7d63d8' : '#33447a'}" stroke-width="${isToday ? 1.5 : 1}"/>
                            <rect x="${x}" y="90" width="76" height="3" rx="1.5" fill="url(#coreRingGradJ)"/>
                            <path d="M${x+8},112 L${x+8},100 L${x+20},100 M${x+68},242 L${x+68},254 L${x+56},254" fill="none" stroke="#9b6ce0" stroke-width="1.2" opacity="0.7"/>

        // Luftqualität + Pollen via Open-Meteo (kostenlos, kein Key)
        async function loadAirAndPollen(lat, lon) {
            const setT = (id, v, col) => { const e = document.getElementById(id); if (e) { e.textContent = v; if (col) e.style.fill = col; } };
            setT('detAirJ', '…'); setT('detPollenJ', '…');
            try {
                // UV-Index parallel holen (OpenWeatherMap-Current hat keins)
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=uv_index`)
                    .then(r => r.json()).then(u => {
                        const uv = u.current?.uv_index;
                        if (uv == null) return;
                        setT('detUvJ', Math.round(uv));
                        const uvCol = uv < 3 ? '#4ec99a' : uv < 6 ? '#f2d43f' : uv < 8 ? '#f39c12' : uv < 11 ? '#e74c3c' : '#9b6ce0';
                        const uvGauge = document.getElementById('detUvGaugeJ');
                        if (uvGauge) { uvGauge.setAttribute('stroke', uvCol); uvGauge.setAttribute('stroke-dashoffset', 214 * (1 - Math.min(uv, 11) / 11)); }
                        const uvNum = document.getElementById('detUvJ');
                        if (uvNum) uvNum.style.fill = uvCol;
                    }).catch(() => {});
                const r = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi,pm2_5,grass_pollen,birch_pollen,alder_pollen,mugwort_pollen,ragweed_pollen`);
                const d = await r.json();
                const c = d.current || {};
                const aqi = Math.round(c.european_aqi ?? -1);
                const aqiTxt = aqi < 0 ? '—' : aqi <= 20 ? 'Sehr gut' : aqi <= 40 ? 'Gut' : aqi <= 60 ? 'Mäßig' : aqi <= 80 ? 'Schlecht' : 'Sehr schlecht';
                const aqiCol = aqi < 0 ? '#8a8a95' : aqi <= 20 ? '#1d9e75' : aqi <= 40 ? '#7fd34e' : aqi <= 60 ? '#f39c12' : '#e74c3c';
                setT('detAirJ', aqiTxt, aqiCol);
                setT('detAirValJ', aqi < 0 ? '' : `EAQI ${aqi} · PM2.5 ${Math.round(c.pm2_5 || 0)}`);
                // Gauge füllen (Umfang 2·π·26 ≈ 163)
                const gauge = document.getElementById('detAirGaugeJ');
                if (gauge && aqi >= 0) { gauge.setAttribute('stroke-dashoffset', 163 * (1 - Math.min(aqi, 100) / 100)); gauge.setAttribute('stroke', aqiCol); }
                setT('detAirGaugeNumJ', aqi < 0 ? '–' : aqi);

                const pollens = { 'Gräser': c.grass_pollen, 'Birke': c.birch_pollen, 'Erle': c.alder_pollen, 'Beifuß': c.mugwort_pollen, 'Ambrosia': c.ragweed_pollen };
                let topName = '', topVal = 0;
                Object.entries(pollens).forEach(([n, v]) => { if ((v || 0) > topVal) { topVal = v; topName = n; } });
                const lvl = topVal <= 0 ? 'Keine' : topVal < 20 ? 'Niedrig' : topVal < 60 ? 'Mittel' : 'Hoch';
                const pCol = topVal <= 0 ? '#1d9e75' : topVal < 20 ? '#7fd34e' : topVal < 60 ? '#f39c12' : '#e74c3c';
                setT('detPollenJ', lvl, pCol);
                setT('detPollenValJ', topVal > 0 ? `vor allem ${topName}` : 'aktuell entspannt');
            } catch(e) {
                setT('detAirJ', '—', '#8a8a95'); setT('detPollenJ', '—', '#8a8a95');
            }
        }

        // ── ROUTENPLANER (MVG) ────────────────────────────────────
        function parseRouteQuery(lq) {
            const m = lq.match(/(?:route|verbindung|wie\s+komme\s+ich|fahre?)\s*(?:von\s+)?(.*?)\s*(?:nach|bis|zum|zur)\s+(.+)/);
            if (!m) return null;
            return { from: (m[1] || '').trim() || 'Dachau Bahnhof', to: m[2].trim() };
        }

        async function mvgFindStation(q) {
            const r = await fetch(`https://www.mvg.de/api/bgw-pt/v3/locations?query=${encodeURIComponent(q)}`);
            const d = await r.json();
            return (Array.isArray(d) ? d : []).find(l => l.type === 'STATION') || null;
        }

        function fmtTimeHM(iso) { return new Date(iso).toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'}); }

        const TRANSPORT_COLORS = { 'SBAHN': '#2a5d3f;color:#b8f0ce', 'UBAHN': '#2a3a5d;color:#b8d4f0', 'BUS': '#3b2a5d;color:#d0c2f0', 'TRAM': '#5d2a2a;color:#f0c2c2', 'BAHN': '#5d3c2a;color:#f0d8c2' };

        async function openRouteMode(fromQ, toQ) {
            showJ('ringListenJ', 0);
            showJ('avatarBodyJ', 0); showJ('faceFeaturesJ', 0);
            document.getElementById('avatarBundleJ').style.transform = '';
            showJ('routeModeJ', 1);
            setLabelJ('🗺️ Route', `${fromQ} → ${toQ}`);
            document.getElementById('routeTitleJ').textContent = '🗺️ Routenplaner';
            const list = document.getElementById('routeListJ');
            list.innerHTML = '<div style="color:#8a8a95;font-size:14px;margin-top:30px;text-align:center">Suche Verbindung…</div>';
            try {
                const [fromSt, toSt] = await Promise.all([mvgFindStation(fromQ), mvgFindStation(toQ)]);
                if (!fromSt || !toSt) {
                    const missing = !fromSt ? fromQ : toQ;
                    list.innerHTML = `<div style="color:#f39c12;text-align:center;margin-top:30px">Station "${missing}" nicht gefunden.</div>`;
                    jarvisSpeak(`Ich konnte die Station ${missing} nicht finden.`);
                    return;
                }
                document.getElementById('routeTitleJ').textContent = `🗺️ ${fromSt.name} → ${toSt.name}`;
                const r = await fetch(`https://www.mvg.de/api/bgw-pt/v3/routes?originStationGlobalId=${fromSt.globalId}&destinationStationGlobalId=${toSt.globalId}`);
                const routes = await r.json();
                const conns = (Array.isArray(routes) ? routes : []).slice(0, 3);
                if (!conns.length) {
                    list.innerHTML = '<div style="color:#8a8a95;text-align:center;margin-top:30px">Keine Verbindung gefunden.</div>';
                    jarvisSpeak('Ich habe keine Verbindung gefunden.');
                    return;
                }

                const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
                list.innerHTML = conns.map((route, idx) => {
                    const legs = (route.parts || []).filter(p => p.line && p.line.transportType !== 'PEDESTRIAN');
                    if (!legs.length) return '';
                    const dep = legs[0].from.plannedDeparture;
                    const arr = legs[legs.length - 1].to.plannedArrival || legs[legs.length - 1].to.plannedDeparture;
                    const durMin = Math.max(1, Math.round((new Date(arr) - new Date(dep)) / 60000));
                    const transfers = legs.length - 1;
                    const legsHtml = legs.map((p, i) => {
                        const col = TRANSPORT_COLORS[p.line.transportType] || '#3a3a42;color:#b4b4bd';
                        const gleis = p.from.platform ? ` · Gl. ${p.from.platform}` : '';
                        const umstieg = i > 0 ? `<div style="font-size:11px;color:#8a8a95;padding:2px 0 4px 14px;border-left:2px dotted #3a3a42;margin-left:20px">⇄ Umsteigen in ${esc(p.from.name)}</div>` : '';
                        return `${umstieg}<div style="display:flex;align-items:center;gap:8px;padding:3px 0">
                            <span style="background:${col};font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;min-width:30px;text-align:center">${esc(p.line.label)}</span>
                            <span style="font-size:12px;color:#eef1f9;font-weight:600">${fmtTimeHM(p.from.plannedDeparture)}</span>
                            <span style="font-size:12px;color:#b4b4bd;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.from.name)}${gleis} → ${esc(p.to.name)}</span>
                            <span style="font-size:12px;color:#8a8a95">${fmtTimeHM(p.to.plannedArrival || p.to.plannedDeparture)}</span>
                        </div>`;
                    }).join('');
                    return `<div style="background:#1a2038;border:1px solid ${idx === 0 ? '#8a8a95' : '#24242a'};border-radius:12px;padding:12px 14px">
                        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
                            <span style="font-size:16px;font-weight:700;color:#EEF1F9">${fmtTimeHM(dep)} → ${fmtTimeHM(arr)}</span>
                            <span style="font-size:12px;color:#8a8a95">${durMin} Min · ${transfers === 0 ? 'direkt' : transfers + '× umsteigen'}</span>
                        </div>${legsHtml}</div>`;
                }).join('');

                // Sprachansage für die erste Verbindung
                const legs0 = (conns[0].parts || []).filter(p => p.line && p.line.transportType !== 'PEDESTRIAN');
                if (legs0.length) {
                    const dep0 = legs0[0], arr0 = legs0[legs0.length - 1];
                    const durMin0 = Math.max(1, Math.round((new Date(arr0.to.plannedArrival || arr0.to.plannedDeparture) - new Date(dep0.from.plannedDeparture)) / 60000));
                    const umstiege = legs0.slice(1).map(p => p.from.name);
                    let msg = `Nimm die ${dep0.line.label} um ${fmtTimeHM(dep0.from.plannedDeparture)} ab ${dep0.from.name}`;
                    if (dep0.from.platform) msg += `, Gleis ${dep0.from.platform}`;
                    if (umstiege.length) msg += `. Umsteigen in ${umstiege.join(' und ')}`;
                    msg += `. Ankunft ${arr0.to.name} um ${fmtTimeHM(arr0.to.plannedArrival || arr0.to.plannedDeparture)} Uhr. Fahrzeit ${durMin0} Minuten.`;
                    jarvisSpeak(msg);
                }
                setLabelJ('🗺️ Route', `${fromSt.name} → ${toSt.name}`);
            } catch(e) {
                list.innerHTML = '<div style="color:#f39c12;text-align:center;margin-top:30px">Routenplaner gerade nicht erreichbar.</div>';
                setLabelJ('🗺️ Route', 'Fehler beim Laden.');
            }
        }

        // ── FAHRTZEIT (Auto: Nominatim-Geocoding + OSRM-Routing, kein Key) ──
        function parseDriveQuery(lq) {
            const m = lq.match(/(?:fahrtzeit|fahrzeit|autofahrt|wie\s+lange\s+(?:fahre|fährt|braucht)\s+\w*)\s*(?:ich\s+)?(?:von\s+)?(.*?)\s*(?:nach|bis|zum|zur)\s+(.+)/);
            if (!m) return null;
            return { from: (m[1] || '').replace(/\b(man|mit dem auto|das auto)\b/g, '').trim() || 'Dachau', to: m[2].replace(/\bmit dem auto\b/g, '').trim() };
        }

        async function geocodePlace(q) {
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`);
            const d = await r.json();
            if (!Array.isArray(d) || !d.length) return null;
            return { lat: d[0].lat, lon: d[0].lon, name: (d[0].display_name || q).split(',')[0] };
        }

        async function openDriveMode(fromQ, toQ) {
            showJ('ringListenJ', 0);
            showJ('avatarBodyJ', 0); showJ('faceFeaturesJ', 0);
            document.getElementById('avatarBundleJ').style.transform = '';
            showJ('driveModeJ', 1);
            setLabelJ('🚗 Fahrtzeit', `${fromQ} → ${toQ}`);
            const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
            set('driveFromJ', fromQ); set('driveToJ', toQ);
            set('driveDurJ', '…'); set('driveDistJ', '—'); set('driveArrJ', '—');
            try {
                const a = await geocodePlace(fromQ);
                const b = await geocodePlace(toQ);
                if (!a || !b) {
                    const missing = !a ? fromQ : toQ;
                    set('driveDurJ', '?');
                    setLabelJ('🚗 Fahrtzeit', `Ort "${missing}" nicht gefunden.`);
                    jarvisSpeak(`Ich konnte ${missing} nicht finden.`);
                    return;
                }
                set('driveFromJ', a.name); set('driveToJ', b.name);
                const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=false`);
                const d = await r.json();
                const route = d.routes && d.routes[0];
                if (!route) {
                    set('driveDurJ', '?');
                    setLabelJ('🚗 Fahrtzeit', 'Keine Auto-Route gefunden.');
                    jarvisSpeak('Ich habe keine Auto-Route gefunden.');
                    return;
                }
                const mins = Math.round(route.duration / 60);
                const h = Math.floor(mins / 60), m = mins % 60;
                const durStr = h ? `${h} h ${m} min` : `${m} min`;
                const km = (route.distance / 1000).toFixed(route.distance < 10000 ? 1 : 0);
                const arr = new Date(Date.now() + route.duration * 1000).toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'});
                set('driveDurJ', durStr);
                set('driveDistJ', `${km} km`);
                set('driveArrJ', `${arr} Uhr`);
                setLabelJ('🚗 Fahrtzeit', `${a.name} → ${b.name}: ${durStr}`);
                jarvisSpeak(`Mit dem Auto brauchst du von ${a.name} nach ${b.name} etwa ${h ? h + ' Stunden und ' : ''}${m} Minuten für ${km} Kilometer. Ankunft gegen ${arr} Uhr.`);
            } catch(e) {
                set('driveDurJ', '?');
                setLabelJ('🚗 Fahrtzeit', 'Routing gerade nicht erreichbar.');
            }
        }

        function handleReminderCommand(lq) {
            showJ('ringListenJ', 0);
            // Zeitangabe irgendwo im Satz finden: "in 10 minuten/sekunden/stunden"
            const m = lq.match(/in\s+(\d+)\s*(sekunden|sekunde|sek|minuten|minute|min|stunden|stunde|std|h)?/);
            if (m) {
                const num = parseInt(m[1]);
                const unit = m[2] || 'minuten';
                const mins = /^st|^h$/.test(unit) ? num * 60 : /^sek/.test(unit) ? num / 60 : num;
                // Text = Satz ohne Trigger-Wörter und ohne die Zeitangabe
                // ("Erinnerung Nhu kommt in 10 Minuten" → "Nhu kommt")
                let text = lq.replace(m[0], ' ')
                    .replace(/erinnere\s+mich|erinnerungen|erinnerung|erinnere|erinner|daran|bitte|jarvis/g, ' ')
                    .replace(/\s+/g, ' ').trim()
                    .replace(/^an\s+/, '').replace(/\s+an$/, '').trim();
                setReminder(mins, text || 'deine Erinnerung');
            } else {
                setLabelJ('⏳ Erinnerung', 'Sag: "Erinnere mich in 10 Minuten an Pizza"');
                jarvisSpeak('Sag zum Beispiel: Erinnere mich in 10 Minuten an die Pizza.');
            }

        function setReminder(minutes, text) {
            const at = Date.now() + minutes * 60000;
            const id = Date.now() + Math.random();
            reminders.push({ id, text, at });
            saveReminders();
            // Erinnerung auch als Notiz mit Fälligkeits-Datum + Uhrzeit ablegen
            savedNotes.push({
                text,
                time: new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}),
                remindAt: at,
                rid: id
